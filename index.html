<style>

t-overflow:ellipsis}.street-notice-btn{border:0;border-radius:999px;background:#2f6bff;color:#fff;font-size:10px;font-weight:900;padding:7px 10px}.street-view-panel{position:absolute;z-index:19;left:10px;right:10px;bottom:calc(env(safe-area-inset-bottom) + 152px);display:none;border-radius:20px;background:rgba(255,255,255,.96);border:1px solid rgba(255,255,255,.82);box-shadow:0 14px 34px rgba(0,0,0,.28);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:10px;pointer-events:auto}.street-view-panel.open{display:block}.street-view-head{display:flex;align-items:center;justify-content:space-between;gap:8px}.street-kicker{font-size:9px;font-weight:900;color:#6b7280}.street-view-title{font-size:15px;font-weight:900;color:#111827}.street-close{width:30px;height:30px;border:0;border-radius:999px;background:#eef2f7;color:#111827;font-weight:900}.street-view-body{margin-top:8px;border-radius:15px;overflow:hidden;background:#111827}.street-road{position:relative;height:210px;overflow:hidden;background:linear-gradient(#91c5ef 0 42%,#425b3a 42% 56%,#24272d 56% 100%)}.street-road .sky{position:absolute;inset:0;background:radial-gradient(circle at 68% 18%,rgba(255,255,255,.9) 0 7%,transparent 8%),linear-gradient(#91c5ef 0 45%,transparent 45%)}.street-road .road{position:absolute;left:18%;right:18%;bottom:-28%;height:80%;background:linear-gradient(90deg,#17191d,#3b3f46 48%,#17191d);clip-path:polygon(38% 0,62% 0,100% 100%,0 100%)}.street-road .centerline{position:absolute;left:49%;top:8%;width:2%;height:100%;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.8) 0 18px,transparent 18px 38px);transform:perspective(160px) rotateX(32deg);transform-origin:top}.street-caption{position:absolute;left:10px;right:10px;bottom:10px;border-radius:999px;background:rgba(17,24,39,.72);color:#fff;font-size:10px;font-weight:900;padding:7px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.street-pin{width:15px;height:15px;border-radius:50%;background:#ff2 .top-chips{display:flex;align-items:center;justify-content:flex-start;gap:8px;margin-top:7px}.meter-row{display:grid;grid-template-columns:auto minmax(0,1fr) minmax(104px,.86fr);gap:6px;margin-bottom:4px}.speed-chip{display:flex;align-items:center;justify-content:center;background:rgba(20,24,32,.92);color:#fff;border-radius:18px;padding:6px 12px;min-width:140px;box-shadow:0 8px 18px rgba(0,0,0,.22);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.speed-num{font-family:var(--display-font);font-size:30px;line-height:1;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.03em}.speed-unit{font-size:11px;font-weight:900;opacity:.88;margin-left:6px}.place{max-width:62%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.86);border-radius:999px;padding:6px 10px;font-size:10px;font-weight:900;box-shadow:0 6px 14px rgba(0,0,0,.13);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.label-toggle{pointer-events:auto;cursor:pointer;border:0;background:rgba(20,24,32,.72);color:#fff;border-radius:999px;padding:6px 10px;font-size:10px;font-weight:900;box-shadow:0 6px 14px rgba(0,0,0,.13);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.label-toggle.off{background:rgba(255,255,255,.78);color:#111827}.label-toggle.warn{background:#b45309;color:#fff}.ring-card{min-width:0;border-radius:18px;background:linear-gradient(180deg,#fff,#f7f9fd);border:1px solid #e3e7ef;box-shadow:0 1px 2px rgba(20,30,60,.04),0 4px 8px rgba(20,30,60,.04),inset 0 1px 0 rgba(255,255,255,.92);padding:4px 8px;display:flex;align-items:center;justify-content:center}.ring-wrap{display:flex;align-items:center;gap:8px;width:100%}.ring-svg{width:44px;height:44px;flex:0 0 44px}.ring-track{stroke:#d9deea;stroke-width:7;fill:none}.ring-progress{stroke:#16B978;stroke-width:7;fill:none;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%}.ring-value{font-size:16px;font-weight:900; .bottom{pointer-events:none;display:flex;flex-direction:column;gap:3px}.mini-dock{position:relative;pointer-events:auto;border-radius:20px;background:linear-gradient(180deg,rgba(247,249,253,.92),rgba(232,236,245,.88));border:1px solid rgba(255,255,255,.78);box-shadow:0 -5px 18px rgba(0,0,0,.14),inset 0 1px 0 rgba(255,255,255,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:5px 5px 4px}.zone-card{border-radius:17px;background:linear-gradient(180deg,#fff,#f7f9fd);border:1px solid #e3e7ef;box-shadow:0 1px 2px rgba(20,30,60,.04),0 5px 10px rgba(20,30,60,.04),inset 0 1px 0 rgba(255,255,255,.92);padding:6px 8px 5px}.zone-head{display:flex;align-items:center;justify-content:space-between;gap:8px}.zone-left{display:flex;align-items:center;gap:8px;min-width:0}.zone-dot{width:14px;height:14px;border-radius:50%;background:#16B978;box-shadow:0 0 0 2px rgba(22,185,120,.12)}.zone-kicker{font-size:9px;font-weight:900;color:var(--sub);letter-spacing:.02em}.zone-main{font-family:var(--display-font);font-size:18px;line-height:1.0;font-weight:900;color:#14b46f;letter-spacing:.02em;white-space:nowrap}.zone-fire{font-size:20px;margin-left:5px}.zone-bpm{display:flex;align-items:flex-end;gap:4px;white-space:nowrap}.zone-bpm .num{font-size:22px;line-height:1;font-weight:900;color:var(--coral);font-variant-numeric:tabular-nums}.zone-bpm .u{font-size:10px;font-weight:900;color:var(--sub);padding-bottom:4px}.zone-line{height:7px;display:flex;gap:5px;margin-top:6px}.zone-seg{flex:1;border-radius:999px;opacity:.22}.zone-seg.active{opacity:1;box-shadow:0 0 0 1px rgba(255,255,255,.8) inset, 0 1px 4px rgba(0,0,0,.08)}.zone-guide{margin-top:4px;font-size:8.8px;line-height:1.2;font-weight:900;color:#596273}.zone-guide .zone-name{display:inline-block;margin-right:6px;color:#111827}.zone-guide .zone-tip{color:#667085}.dock-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:4px;margin-top:4px}.dock-card{min-width:0;border-radius:15px;background:linear-gradient @media(max-height:740px){.right-map-tools{right:10px;bottom:calc(env(safe-area-inset-bottom) + 250px);gap:5px}.recenter-btn{width:42px;height:42px}.recenter-svg{width:42px;height:42px}.building-fab,.terrain-fab,.street-fab{font-size:9px;padding:6px 8px;min-width:58px}.hero{padding:8px 10px}.hero-icon{width:38px;height:38px;border-radius:15px;font-size:21px}.landmark{font-size:26px}.remain{font-size:12px}.subgoals{font-size:9.5px}.top-chips{margin-top:6px}.meter-row{grid-template-columns:auto minmax(0,1fr) minmax(98px,.84fr);gap:5px}.speed-chip{min-width:132px;padding:6px 10px}.speed-num{font-size:28px}.speed-unit{font-size:10px}.ring-svg{width:40px;height:40px}.ring-main{font-size:14px}.action-btn{min-height:52px;font-size:14px}.mini-dock{padding:4px}.zone-main{font-size:17px}.zone-bpm .num{font-size:21px}.dock-grid{gap:4px}.dock-card{padding:4px}.value{font-size:14px}.zone-guide{font-size:8.6px}.maplibregl-ctrl-bottom-right{bottom:calc(env(safe-area-inset-bottom) + 12px)!important}}@media(max-width:370px){.right-map-tools{right:9px;bottom:calc(env(safe-area-inset-bottom) + 236px);gap:5px}.recenter-btn{width:40px;height:40px}.recenter-svg{width:40px;height:40px}.building-fab,.terrain-fab,.street-fab{font-size:9px;padding:6px 7px;min-width:56px}.landmark{font-size:25px}.top-chips{gap:6px}.meter-row{grid-template-columns:auto minmax(0,1fr) minmax(92px,.82fr);gap:4px}.speed-chip{min-width:118px;padding:5px 8px}.speed-num{font-size:25px}.speed-unit{font-size:9px}.ring-svg{width:38px;height:38px}.ring-main{font-size:13px}.action-btn{min-height:48px;font-size:13px}.dock-grid{grid-template-columns:repeat(3,1fr);gap:4px}.value{font-size:14px}.label{font-size:8px}.place{display:none}.mode{display:none}.maplibregl-ctrl-bottom-right{bottom:calc(env(safe-area-inset-bottom) + 10px)!important;right:8px!important}}

/* D38: 現地ビューは小窓ではなく背景全体を切り替える */
.street-notice{
  top:calc(env(safe-area-inset-top) + 154px)!important;
  left:12px!important;
  right:12px!important;
  z-index:21!important;
}
.street-notice-main{font-size:11.5px!important}
.street-notice-btn{background:#2f6bff!important}
.street-full{
  position:absolute;
  inset:0;
  z-index:3;
  display:none;
  overflow:hidden;
  background:#111827;
  pointer-events:none;
}
.street-full.open{display:block}
.street-full-bg{
  position:absolute;
  inset:0;
  background:linear-gradient(#82c7f4 0 42%,#47743c 42% 54%,#202329 54% 100%);
  overflow:hidden;
}
.street-sky{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 73% 16%,rgba(255,255,255,.95) 0 5%,rgba(255,255,255,.35) 6%,transparent 11%),
    linear-gradient(#82c7f4 0 44%,transparent 44%);
}
.street-mountains{
  position:absolute;
  left:-12%;
  right:-12%;
  top:31%;
  height:24%;
  background:linear-gradient(135deg,#315d46 0 30%,#406f4f 31% 52%,#2d513e 53% 72%,#4f814f 73%);
  clip-path:polygon(0 80%,10% 35%,24% 72%,35% 28%,50% 80%,63% 38%,77% 68%,91% 24%,100% 82%,100% 100%,0 100%);
  opacity:.9;
}
.street-side{
  position:absolute;
  bottom:0;
  width:45%;
  height:50%;
  background:linear-gradient(180deg,#4e8a45,#24331f);
  opacity:.95;
}
.street-side.left{left:-10%;clip-path:polygon(0 0,58% 0,100% 100%,0 100%)}
.street-side.right{right:-10%;clip-path:polygon(42% 0,100% 0,100% 100%,0 100%)}
.street-road-full{
  position:absolute;
  left:14%;
  right:14%;
  bottom:-22%;
  height:74%;
  background:linear-gradient(90deg,#15171b,#42464e 47%,#252830 52%,#15171b);
  clip-path:polygon(40% 0,60% 0,100% 100%,0 100%);
  box-shadow:0 -30px 60px rgba(0,0,0,.25);
}
.street-centerline{
  position:absolute;
  left:49.2%;
  top:2%;
  width:1.6%;
  height:100%;
  background:repeating-linear-gradient(to bottom,rgba(255,255,255,.88) 0 24px,transparent 24px 52px);
  transform:perspective(180px) rotateX(35deg);
  transform-origin:top;
  opacity:.86;
}
.street-full-caption{
  position:absolute;
  z-index:4;
  left:12px;
  right:12px;
  bottom:calc(env(safe-area-inset-bottom) + 136px);
  border-radius:999px;
  background:rgba(17,24,39,.72);
  color:white;
  font-size:11px;
  font-weight:900;
  padding:8px 11px;
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.pedal-control{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:5px;
  align-items:center;
  margin:5px 0;
}
.pedal-btn{
  border:0;
  border-radius:999px;
  background:#eef2f7;
  color:#17202c;
  font-size:11px;
  font-weight:900;
  padding:8px 6px;
}
.pedal-btn.plus{background:#e8f0ff;color:#2155d8}
.pedal-readout{
  min-width:62px;
  border-radius:999px;
  background:#fff;
  border:1px solid #e3e7ef;
  text-align:center;
  padding:6px 9px;
  font-size:14px;
  font-weight:900;
  color:#111827;
}
.pedal-readout small{font-size:9px;color:#6b7280;margin-left:2px}
@media(max-height:740px){
  .street-notice{top:calc(env(safe-area-inset-top) + 136px)!important}
  .pedal-control{margin:4px 0}
  .pedal-btn{font-size:10px;padding:6px 5px}
  .pedal-readout{padding:5px 8px}
}
@media(max-height:670px){
  .street-notice{top:calc(env(safe-area-inset-top) + 118px)!important}
  .street-full-caption{bottom:calc(env(safe-area-inset-bottom) + 118px)}
}

</head>
<body>
<div class="phone">
  <div id="map" class="map"></div>
  <div class="right-map-tools">
    <button class="recenter-btn" id="recenterBtn" aria-label="現在地へ">
      <svg viewBox="0 0 64 64" class="recenter-svg" aria-hidden="true">
        <rect x="6.5" y="6.5" width="51" height="51" rx="10.5" fill="rgba(255,255,255,.96)" stroke="#2f6bff" stroke-width="3.5"/>
        <circle cx="32" cy="32" r="16.5" fill="none" stroke="#2f6bff" stroke-width="5.2"/>
        <path d="M32 11.5v12.5M32 40v12.5M11.5 32h12.5M40 32h12.5" fill="none" stroke="#2f6bff" stroke-width="5.2" stroke-linecap="round"/>
        <circle cx="32" cy="32" r="3.7" fill="#2f6bff"/>
      </svg>
    </button>
    <button class="building-fab off" id="buildingToggle" aria-label="建物3D切替">建物 OFF</button>
    <button class="terrain-fab off" id="terrainToggle" aria-label="地形3D切替">地形 OFF</button>
    <button class="street-fab off" id="streetToggle" aria-label="現地ビュー切替">現地 OFF</button>
  </div>
  <div class="street-notice" id="streetNotice">
    <div class="street-notice-main" id="streetNoticeMain">現地ビュー区間まで —</div>
    <button class="street-notice-btn" id="streetQuickBtn">現地ビュー</button>
  </div>
  <div class="street-full" id="streetFull">
    <div class="street-full-bg">
      <div class="street-sky"></div>
      <div class="street-mountains"></div>
      <div class="street-side left"></div>
      <div class="street-side right"></div>
      <div class="street-road-full">

<script>

const CP=[{km:0,t:'large',n:'三保松原'},{km:12,t:'small'},{km:27,t:'small'},{km:35,t:'medium',n:'大井川'},{km:52,t:'small'},{km:70,t:'medium',n:'掛川城'},{km:88,t:'small'},{km:104,t:'small'},{km:115,t:'medium',n:'浜名湖・弁天島'},{km:133,t:'small'},{km:160,t:'small'},{km:168,t:'medium',n:'岡崎城'},{km:186,t:'small'},{km:195,t:'large',n:'名古屋城'}];
const zones=[{n:'ウォームアップ',c:'#9CC3FF',max:108},{n:'脂肪燃焼',c:'#16B978',max:132},{n:'有酸素',c:'#F6C544',max:150},{n:'全力',c:'#FF8A3D',max:168},{n:'最大',c:'#FF5872',max:999}];

  {start:9.0,end:11.8,name:'焼津駅周辺・市街地'},

];

let st={km:8.2,sess:0,t:720,cal:96,hr:123,mx:28.4,rpm:58,running:true,follow:true,last:performance.now(),route:null,routeDist:0,interacting:false,manualUntil:0,lastPoint:null,lastHeading:50,camCenter:null,camBearing:null,expanded:false, labelsOn:true, symbolLayerIds:[], buildingsOn:false, buildingLayerId:null, buildingLayerIds:[], terrainOn:false, terrainReady:false, streetMode:false, streetMarkers:[], activeStreet:null};
const $=id=>document.getElementById(id);
function setupDots(){CP.forEach(c=>{let d=document.createElement('div');d.className='dot '+c.t;d.style.left=(c.km/LEG*100)+'%';$('dots').appendChild(d);});}
function zoneOf(hr){for(let i=0;i<zones.length;i++)if(hr<zones[i].max)return i;return 4;}
function next(t){return CP.find(c=>c.t===t&&c.km>st.km+.01)}
function fmtTime(sec){return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(Math.floor(sec%60)).padStart(2,'0')}
function renderUI(){const kmh=st.rpm*2*2.1/60*3.6; const prog=Math.min(100,st.km/LEG*100); const z=zoneOf(st.hr); const nS=next('small'),nM=next('medium'),nL=next('large');
 $('speed').textContent=kmh.toFixed(1); const rpmRatio=Math.max(0,Math.min(1,st.rpm/120)); $('ringValue').textContent=Math.round(st.rpm); $('ringMain').textContent=Math.round(st.rpm)+' rpm'; const C=2*Math.PI*18; $('cadenceRing').setAttribute('stroke-dasharray', C.toFixed(1)); $('cadenceRing').setAttribute('stroke-dashoffset', (C*(1-rpmRatio)).toFixed(1)); $('mode').textContent=st.follow?'追従 ON':'追従 OFF'; $('remain').textContent='あと '+(nL?(nL.km-st.km).toFixed(1):'0.0')+' km'; $('fill').style.width=prog+'%'; $('bike').style.left=prog+'%';
 $('smallGoal').textContent=nS?'通過地点 '+(nS.km-st.km).toFixed(1)+'km':'通過地点 —'; $('mediumGoal').textContent=nM?'中継地 '+nM.n+' '+(nM.km-st.km).toFixed(0)+'km':'中継地 —';
 const stats=[['距離',st.sess.toFixed(2),'km'],['時間',fmtTime(st.t),''],['消費',Math.round(st.cal),'kcal'],['最高',st.mx.toFixed(1),'km/h'],['XP',Math.round(st.cal*0.9),''],['累計',st.km.toFixed(1),'km']];
 $('metrics').innerHTML=stats.map(m=>'<div class="dock-card"><div class="label">'+m[0]+'</div><div class="value">'+m[1]+'<span class="unit">'+m[2]+'</span></div></div>').join('');
 const topBtn=$('runBtnTop'); if(topBtn){topBtn.textContent=st.running?'ストップ':'スタート'; topBtn.classList.toggle('stop',st.running);} const pr=$('pedalRpm'); if(pr){pr.textContent=Math.round(st.rpm);} 
 $('bars').innerHTML=zones.map((a,i)=>'<div class="zone-seg '+(i===z?'active':'')+'" style="background:'+a.c+'"></div>').join('');
 const zoneName=zones[z].n; let tip=''; let fire='';
 if(z===0){tip='少し上げると脂肪燃焼に入りやすいです';}
 else if(z===1){tip='今は脂肪燃焼ゾーンです'; fire='🔥';}
 else if(z===2){tip='有酸素トレーニング中です';}
 else if(z===3){tip='かなり高め。少し落とすと続けやすいです';}
 else {tip='最大強度に近いです。無理しすぎに注意';}
 $('zoneDot').style.background=zones[z].c; $('zoneDot').style.boxShadow='0 0 0 3px color-mix(in srgb, '+zones[z].c+' 18%, white)';
 $('zoneMain').innerHTML=zoneName + (fire ? ' <span class="zone-fire">'+fire+'</span>' : ''); $('zoneBpm').textContent=Math.round(st.hr); $('zoneGuide').innerHTML='<span class="zone-tip">'+tip+'</span>';
}
function hav(a,b){const R=6371e3,toRad=x=>x*Math.PI/180; const dLat=toRad(b[1]-a[1]),dLon=toRad(b[0]-a[0]); const lat1=toRad(a[1]),lat2=toRad(b[1]); const h=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2; return 2*R*Math.asin(Math.sqrt(h));}
function routeLength(coords){let d=0;for(let i=1;i<coords.length;i++)d+=hav(coords[i-1],coords[i]);return d;}
function pointAt(coords, meters){if(!coords||coords.length<2)return [138.306,34.831]; let remain=meters; for(let i=1;i<coords.length;i++){let seg=hav(coords[i-1],coords[i]); if(remain<=seg){let t=seg?remain/seg:0; return [coords[i-1][0]+(coords[i][0]-coords[i-1][0])*t,coords[i-1][1]+(coords[i][1]-coords[i-1][1])*t];} remain-=seg;} return coords[coords.length-1];}
function bearing(a,b){const toRad=x=>x*Math.PI/180,toDeg=x=>x*180/Math.PI; const lon1=toRad(a[0]),lon2=toRad(b[0]),lat1=toRad(a[1]),lat2=toRad(b[1]); const y=Math.sin(lon2-lon1)*Math.cos(lat2); const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(lon2-lon1); return (toDeg(Math.atan2(y,x))+360)%360;}
function lerp(a,b,t){return a+(b-a)*t;}
function angleLerp(a,b,t){let d=((b-a+540)%360)-180; return (a+d*t+360)%360;}
function nowMs(){return Date.now();}
let map,marker;
function userInteracting(ms=2800){st.interacting=true; st.manualUntil=nowMs()+ms;}
function currentStreetZone(){
 return MLY_ZONES.find(z=>st.km>=z.start && st.km<=z.end) || null;
}
function nextStreetZone(){
 return MLY_ZONES.find(z=>z.start>st.km) || null;
}
function updateStreetUX(){
 const notice=$('streetNotice'), main=$('streetNoticeMain'), btn=$('streetQuickBtn');
 const cur=currentStreetZone();
 const nextZ=nextStreetZone();
 st.activeStreet=cur;
 if(cur){
   notice.classList.add('show');

 }else if(nextZ && (nextZ.start-st.km)<=5){
   notice.classList.add('show');
   main.textContent='現地ビュー区間まで あと '+(nextZ.start-st.km).toFixed(1)+'km：'+nextZ.name;
   btn.textContent='予告';
 }else{
   notice.classList.remove('show');
 }
 const sbtn=$('streetToggle');
 if(sbtn){sbtn.textContent=st.streetMode?'SV ON':'現地 OFF'; sbtn.classList.toggle('off',!st.streetMode);}
 const full=$('streetFull');
 if(full){full.classList.toggle('open',!!(st.streetMode&&cur));}
 if(st.streetMode&&cur){
   const cap=$('streetCaption');
   if(cap) cap.textContent='現地ビューで走行中：'+cur.name+' / 航空写真に戻すには「航空写真」または右の現地ボタン';
 }
}

 const cur=currentStreetZone();
 st.streetMode=!st.streetMode;
 if(st.streetMode && !cur){
   const nz=nextStreetZone();
   st.streetMode=false;
   const notice=$('streetNotice'), main=$('streetNoticeMain');
   if(notice&&main&&nz){notice.classList.add('show'); main.textContent='まだ現地ビュー区間外です。表示可能区間まで あと '+(nz.start-st.km).toFixed(1)+'km';}
 } 
 updateStreetUX();
}
function closeStreetPanel(){st.streetMode=false; updateStreetUX();}
function addStreetZoneMarkers(){
 if(!map || !st.route || !st.routeDist) return;
 (st.streetMarkers||[]).forEach(m=>{try{m.remove();}catch(e){}});
 st.streetMarkers=[];
 MLY_ZONES.forEach((z,i)=>{
   const p=pointAt(st.route, Math.min(z.start*1000, st.routeDist-10));
   const el=document.createElement('div');
   el.className='street-pin';
   el.title=z.name;
   el.onclick=()=>{st.km=z.start; st.sess=z.start; st.follow=true; updateStreetUX();};
   const m=new maplibregl.Marker({element:el}).setLngLat(p).addTo(map);
   st.streetMarkers.push(m);
 });
}
function adjustPedal(delta){
 st.rpm=Math.max(25,Math.min(110,st.rpm+delta));
 const p=$('pedalRpm'); if(p) p.textContent=Math.round(st.rpm);
 renderUI();
}
function initMap(){
 if(!window.maplibregl){$('mode').textContent='MapLibre読込失敗';return;}

 // D38 GitHub/https検証版：Claude方式。OpenFreeMap styleをベースにし、航空写真を最初のsymbol直下へ差し込む。
 // ローカルHTML用の疑似/埋め込みラベルは一切使わない。
 map=new maplibregl.Map({
   container:'map',
   style:'https://tiles.openfreemap.org/styles/liberty',
   center:[138.309,34.835],
   zoom:15.8,
   pitch:58,
   bearing:50,
   antialias:true,
   dragRotate:true,
   touchZoomRotate:true,
   cooperativeGestures:false
 });

 map.addControl(new maplibregl.NavigationControl({visualizePitch:true,showCompass:true}),'bottom-right');
 map.touchZoomRotate.enable(); map.touchZoomRotate.enableRotation(); map.dragRotate.enable(); map.scrollZoom.enable(); map.doubleClickZoom.enable(); map.keyboard.enable();

 const canvas=map.getCanvas();
 ['touchstart','pointerdown','wheel'].forEach(ev=>canvas.addEventListener(ev,()=>userInteracting(3000),{passive:true}));
 ['dragstart','rotatestart','pitchstart','zoomstart'].forEach(ev=>map.on(ev,()=>userInteracting(3200)));
 ['dragend','rotateend','pitchend','zoomend'].forEach(ev=>map.on(ev,()=>{st.manualUntil=nowMs()+2600;}));

 map.on('error',e=>{
   const b=$('labelToggle');
   if(b){b.textContent='OFMエラー'; b.classList.add('warn');}
   console.warn('map error', e && e.error ? e.error : e);
 });

 map.on('load',async()=>{
   const layers=map.getStyle().layers||[];
   const firstSym=layers.find(l=>l.type==='symbol');
   const beforeId=firstSym ? firstSym.id : undefined;

   try{
     map.addSource('gsi-photo',{
       type:'raster',
       tiles:['https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg'],
       tileSize:256,
       attribution:'地理院タイル'
     });
     map.addLayer({id:'gsi-photo',type:'raster',source:'gsi-photo',paint:{'raster-opacity':1}}, beforeId);
   }catch(e){
     const b=$('labelToggle');
     if(b){b.textContent='航空写真エラー'; b.classList.add('warn');}
   }

   st.symbolLayerIds=(map.getStyle().layers||[]).filter(l=>l.type==='symbol').map(l=>l.id);
   st.symbolLayerIds.forEach(id=>{
     try{
       map.setPaintProperty(id,'text-halo-color','rgba(255,255,255,.95)');
       map.setPaintProperty(id,'text-halo-width',2.1);
       map.setPaintProperty(id,'text-halo-blur',0.25);
     }catch(e){}
   });

   const b=$('labelToggle');
   if(b){
     b.textContent=st.symbolLayerIds.length?'OFMラベル ON':'OFMラベルなし';
     b.classList.toggle('warn',false);
     b.classList.toggle('off',!st.symbolLayerIds.length);
   }

   hideAllBuilding3DOnLoad(); setTimeout(()=>{if(!st.buildingsOn) hideAllBuilding3DOnLoad();},800);

   let el=document.createElement('div');el.style.width='24px';el.style.height='24px';el.style.borderRadius='50%';el.style.background='#2f6bff';el.style.border='4px solid white';el.style.boxShadow='0 2px 10px rgba(0,0,0,.35)'; marker=new maplibregl.Marker({element:el}).setLngLat([138.309,34.835]).addTo(map);

   let coords=[[138.3015,34.8447],[138.3041,34.8409],[138.3090,34.8368],[138.3152,34.8335],[138.3232,34.8291],[138.3330,34.8250],[138.3425,34.8215],[138.3565,34.8188]];
   try{
     const url='https://router.project-osrm.org/route/v1/driving/'+coords.map(c=>c.join(',')).join(';')+'?overview=full&geometries=geojson';
     const res=await fetch(url); const json=await res.json();
     if(json.routes&&json.routes[0]&&json.routes[0].geometry){coords=json.routes[0].geometry.coordinates; $('mode').textContent='追従 ON';}
   }catch(e){$('mode').textContent='追従 ON';}

   st.route=coords; st.routeDist=routeLength(coords); st.lastPoint=coords[0];
   map.addSource('route',{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:coords}}});

   const firstSymbolNow=(map.getStyle().layers||[]).find(l=>l.type==='symbol');
   const routeBefore=firstSymbolNow ? firstSymbolNow.id : undefined;
   try{map.addLayer({id:'route-glow',type:'line',source:'route',paint:{'line-color':'#ffffff','line-width':9,'line-opacity':0.82}}, routeBefore);}catch(e){}
   try{map.addLayer({id:'route',type:'line',source:'route',paint:{'line-color':'#2f6bff','line-width':5,'line-opacity':0.96}}, routeBefore);}catch(e){}
   addStreetZoneMarkers();
 });
}

function toggleOfmLabels(){
 if(!st.symbolLayerIds.length) return;
 st.labelsOn=!st.labelsOn;
 const b=$('labelToggle');
 if(b){b.textContent=st.labelsOn?'OFMラベル ON':'OFMラベル OFF'; b.classList.toggle('off',!st.labelsOn);}

function collectExistingBuildingLayers(){
 if(!map) return [];
 const ids=[];
 (map.getStyle().layers||[]).forEach(l=>{
   if(l.type==='fill-extrusion'){
     ids.push(l.id);
   }
 });
 return ids;
}

function hideAllBuilding3DOnLoad(){
 // OpenFreeMap側の既存3D建物レイヤーが最初から表示されるケースがあるため、
 // 起動直後にfill-extrusionを全部OFFにする。

 st.buildingLayerIds.forEach(id=>{
   try{map.setLayoutProperty(id,'visibility','none');}catch(e){}
 });

   btn.textContent='建物 OFF';
   btn.classList.add('off');
   btn.classList.remove('err');
 }
}

function findVectorSourceForBuildings(){
 const sources=(map.getStyle()&&map.getStyle().sources)||{};
 for(const id of Object.keys(sources)){
   const src=sources[id]||{};
   const s=JSON.stringify(src).toLowerCase();
   if(src.type==='vector' && (s.includes('openfreemap') || s.includes('openmaptiles') || s.includes('tiles.openfreemap'))){
     return id;
   }
 }
 const vectorIds=Object.keys(sources).filter(id=>sources[id]&&sources[id].type==='vector');
 return vectorIds.length ? vectorIds[0] : null;
}

function ensureBuildingLayer(){
 if(!map) return false;

 // まずOpenFreeMap styleにもともと存在するfill-extrusionを使う
 const existing=collectExistingBuildingLayers();
 if(existing.length){
   st.buildingLayerIds=existing;
   return true;
 }

 // 既存が無い場合だけ、押した時に自前のfill-extrusionを作る
 const sourceId=findVectorSourceForBuildings();
 if(!sourceId) return false;

 const firstSymbol=(map.getStyle().layers||[]).find(l=>l.type==='symbol');
 const beforeId=firstSymbol?firstSymbol.id:undefined;

 const candidates=['building','buildings'];
 for(const sourceLayer of candidates){
   const id='ofm-building-3d-'+sourceLayer;
   try{
     if(!map.getLayer(id)){
       map.addLayer({
         id,
         type:'fill-extrusion',
         source:sourceId,
         'source-layer':sourceLayer,
         minzoom:14,
         layout:{visibility:'none'},
         paint:{
           'fill-extrusion-color':'rgba(80,92,110,.46)',
           'fill-extrusion-height':['case',['has','render_height'],['get','render_height'],['has','height'],['get','height'],12],
           'fill-extrusion-base':['case',['has','render_min_height'],['get','render_min_height'],0],
           'fill-extrusion-opacity':0.34
         }
       }, beforeId);
     }
     st.buildingLayerId=id;
     st.buildingLayerIds=[id];
     return true;
   }catch(e){}
 }
 return false;
}

function toggleBuildings(){
 const btn=document.getElementById('buildingToggle');
 if(!ensureBuildingLayer()){
   if(btn){btn.textContent='建物不可'; btn.classList.add('err');}
   return;
 }
 st.buildingsOn=!st.buildingsOn;
 st.buildingLayerIds.forEach(id=>{
   try{map.setLayoutProperty(id,'visibility',st.buildingsOn?'visible':'none');}catch(e){}
 });
 if(btn){
   btn.textContent=st.buildingsOn?'建物 ON':'建物 OFF';
   btn.classList.toggle('off',!st.buildingsOn);
   btn.classList.remove('err');
 }
}

function ensureTerrainSource(){
 if(!map) return false;
 try{
   if(!map.getSource('terrain-dem')){
     // D31: MapLibreが直接読める Mapzen Terrarium DEM を使用。
     // D30の地理院dem_png + encoding:gsi はMapLibre標準のraster-demでは解釈されず、地形が平らになる。
     map.addSource('terrain-dem',{
       type:'raster-dem',
       tiles:['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
       tileSize:256,
       maxzoom:15,
       encoding:'terrarium',
       attribution:'Terrain tiles by Mapzen'
     });
   }
   st.terrainReady=true;
   return true;
 }catch(e){
   console.warn('terrain source failed', e);
   return false;
 }
}

function toggleTerrain(){
 const btn=document.getElementById('terrainToggle');
 if(!map) return;
 if(!st.terrainOn){
   if(!ensureTerrainSource()){
     if(btn){btn.textContent='地形不可'; btn.classList.add('err');}
     return;
   }
   try{
     // 富士山や箱根などでも変化が見えやすいよう自然寄りに誇張。
     map.setTerrain({source:'terrain-dem', exaggeration:1.5});
     st.terrainOn=true;
     if(btn){btn.textContent='地形 ON'; btn.classList.remove('off','err');}
   }catch(e){
     console.warn('setTerrain failed', e);
     if(btn){btn.textContent='地形不可'; btn.classList.add('err');}
   }
 }else{
   try{ map.setTerrain(null); }catch(e){}
   st.terrainOn=false;
   if(btn){btn.textContent='地形 OFF'; btn.classList.add('off'); btn.classList.remove('err');}
 }
}

function recenterToBike(){
 if(!map) return;
 const p=st.lastPoint || (marker ? marker.getLngLat().toArray() : map.getCenter().toArray());
 const hd=st.lastHeading || map.getBearing();
 st.follow=true;
 st.manualUntil=0;
 st.interacting=false;
 st.camCenter=[p[0],p[1]];
 st.camBearing=hd;
 map.easeTo({center:p,bearing:hd,zoom:map.getZoom(),pitch:map.getPitch(),duration:420});
 renderUI();
}

function updateCamera(p, heading){
 if(!map || !st.follow) return;
 const t=nowMs();
 if(t<st.manualUntil){st.interacting=true;return;} else {st.interacting=false;}
 st.camCenter=[p[0],p[1]];
 if(st.camBearing==null) st.camBearing=heading;
 let diff=((heading-st.camBearing+540)%360)-180;
 if(Math.abs(diff)>5) st.camBearing=heading;
 map.jumpTo({center:st.camCenter,bearing:st.camBearing,zoom:map.getZoom(),pitch:map.getPitch()});
}


function tick(now){const dt=Math.min(0.25,(now-st.last)/1000);st.last=now; if(st.running){const kmh=st.rpm*2*2.1/60*3.6, dk=(kmh/3600)*dt; st.km=Math.min(LEG,st.km+dk);st.sess+=dk;st.t+=dt;st.cal+=dk*12;st.hr+=(70+st.rpm*.92-st.hr)*Math.min(1,dt*.7);st.mx=Math.max(st.mx,kmh);} 
 if(st.route&&marker&&map){const localMeters=Math.min(st.sess*1000, Math.max(0,(st.routeDist||1)-30)); const p=pointAt(st.route,localMeters); const p2=pointAt(st.route,Math.min(localMeters+18, st.routeDist||localMeters+18)); marker.setLngLat(p); const hd=bearing(p,p2); st.lastPoint=p; st.lastHeading=hd; updateCamera(p,hd);}
 updateStreetUX(); renderUI(); requestAnimationFrame(tick);}
document.addEventListener('click',e=>{const recenter=e.target.closest('#recenterBtn'); if(recenter){recenterToBike(); return;} const pDown=e.target.closest('#pedalDown'); if(pDown){adjustPedal(-5); return;} const pUp=e.target.closest('#pedalUp'); if(pUp){adjustPedal(5); return;} const streetBtn=e.target.closest('#streetToggle,#streetQuickBtn'); if(streetBtn){toggleStreetMode(); return;} const terrainBtn=e.target.closest('#terrainToggle'); if(terrainBtn){toggleTerrain(); return;} const buildingBtn=e.target.closest('#buildingToggle'); if(buildingBtn){toggleBuildings(); return;} const labelBtn=e.target.closest('#labelToggle'); if(labelBtn){toggleOfmLabels(); return;} const runBtn=e.target.closest('#runBtnTop'); if(runBtn){st.running=!st.running; renderUI(); return;} const modeBtn=e.target.closest('#mode'); if(modeBtn){st.follow=!st.follow; if(st.follow&&map){recenterToBike();} renderUI(); return;}});
setupDots();renderUI();initMap();requestAnimationFrame(tick);
</script>
</body>
</html>

/* D38: 現地ビューは小窓ではなく背景全体を切り替える */
.street-notice{
  top:calc(env(safe-area-inset-top) + 154px)!important;
  left:12px!important;
  right:12px!important;
  z-index:21!important;
}
.street-notice-main{font-size:11.5px!important}
.street-notice-btn{background:#2f6bff!important}
.street-full{
  position:absolute;
  inset:0;
  z-index:3;
  display:none;
  overflow:hidden;
  background:#111827;
  pointer-events:none;
}
.street-full.open{display:block}
.street-full-bg{
  position:absolute;
  inset:0;
  background:linear-gradient(#82c7f4 0 42%,#47743c 42% 54%,#202329 54% 100%);
  overflow:hidden;
}
.street-sky{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 73% 16%,rgba(255,255,255,.95) 0 5%,rgba(255,255,255,.35) 6%,transparent 11%),
    linear-gradient(#82c7f4 0 44%,transparent 44%);
}
.street-mountains{
  position:absolute;
  left:-12%;
  right:-12%;
  top:31%;
  height:24%;
  background:linear-gradient(135deg,#315d46 0 30%,#406f4f 31% 52%,#2d513e 53% 72%,#4f814f 73%);
  clip-path:polygon(0 80%,10% 35%,24% 72%,35% 28%,50% 80%,63% 38%,77% 68%,91% 24%,100% 82%,100% 100%,0 100%);
  opacity:.9;
}
.street-side{
  position:absolute;
  bottom:0;
  width:45%;
  height:50%;
  background:linear-gradient(180deg,#4e8a45,#24331f);
  opacity:.95;
}
.street-side.left{left:-10%;clip-path:polygon(0 0,58% 0,100% 100%,0 100%)}
.street-side.right{right:-10%;clip-path:polygon(42% 0,100% 0,100% 100%,0 100%)}
.street-road-full{
  position:absolute;
  left:14%;
  right:14%;
  bottom:-22%;
  height:74%;
  background:linear-gradient(90deg,#15171b,#42464e 47%,#252830 52%,#15171b);
  clip-path:polygon(40% 0,60% 0,100% 100%,0 100%);
  box-shadow:0 -30px 60px rgba(0,0,0,.25);
}
.street-centerline{
  position:absolute;
  left:49.2%;
  top:2%;
  width:1.6%;
  height:100%;
  background:repeating-linear-gradient(to bottom,rgba(255,255,255,.88) 0 24px,transparent 24px 52px);
  transform:perspective(180px) rotateX(35deg);
  transform-origin:top;
  opacity:.86;
}
.street-full-caption{
  position:absolute;
  z-index:4;
  left:12px;
  right:12px;
  bottom:calc(env(safe-area-inset-bottom) + 136px);
  border-radius:999px;
  background:rgba(17,24,39,.72);
  color:white;
  font-size:11px;
  font-weight:900;
  padding:8px 11px;
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.pedal-control{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:5px;
  align-items:center;
  margin:5px 0;
}
.pedal-btn{
  border:0;
  border-radius:999px;
  background:#eef2f7;
  color:#17202c;
  font-size:11px;
  font-weight:900;
  padding:8px 6px;
}
.pedal-btn.plus{background:#e8f0ff;color:#2155d8}
.pedal-readout{
  min-width:62px;
  border-radius:999px;
  background:#fff;
  border:1px solid #e3e7ef;
  text-align:center;
  padding:6px 9px;
  font-size:14px;
  font-weight:900;
  color:#111827;
}
.pedal-readout small{font-size:9px;color:#6b7280;margin-left:2px}
@media(max-height:740px){
  .street-notice{top:calc(env(safe-area-inset-top) + 136px)!important}
  .pedal-control{margin:4px 0}
  .pedal-btn{font-size:10px;padding:6px 5px}
  .pedal-readout{padding:5px 8px}
}
@media(max-height:670px){
  .street-notice{top:calc(env(safe-area-inset-top) + 118px)!important}
  .street-full-caption{bottom:calc(env(safe-area-inset-bottom) + 118px)}
}



/* D62: old UI base restore + safe GSI map. */
.map{background:#172333!important;overflow:hidden!important}
.tile-layer{position:absolute;inset:0;z-index:0}
.tile{position:absolute;width:256px;height:256px;object-fit:cover;background:#223246}
.route-svg{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none}
.current-marker{position:absolute;z-index:3;width:26px;height:26px;border-radius:50%;background:#2f6bff;border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.35);display:grid;place-items:center;font-size:14px;transform:translate(-50%,-50%)}
#labelToggle{background:rgba(255,255,255,.78)!important;color:#111827!important}

.pedal-control{display:none!important}
.phone.manual .pedal-control{display:flex!important}
.map-restore{display:none;position:absolute;z-index:99999;right:14px;top:calc(env(safe-area-inset-top) + 14px);border:0;border-radius:999px;background:rgba(255,255,255,.94);color:#111827;font-size:13px;font-weight:900;padding:11px 15px;box-shadow:0 10px 24px rgba(0,0,0,.24);font-family:inherit}
.phone.compact .hero{padding:8px 10px!important}
.phone.compact .hero-icon,.phone.compact .eyebrow,.phone.compact .progress,.phone.compact .subgoals{display:none!important}
.phone.compact .hero-main{align-items:center!important}
.phone.compact .landmark{font-size:24px!important}
.phone.compact .remain{font-size:13px!important}
.phone.compact .top-chips{display:none!important}
.phone.compact .mini-dock{padding:5px!important}

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script><script>
const LEG=195;
const CP=[{km:0,t:'large',n:'三保松原'},{km:12,t:'small'},{km:27,t:'small'},{km:35,t:'medium',n:'大井川'},{km:52,t:'small'},{km:70,t:'medium',n:'掛川城'},{km:88,t:'small'},{km:104,t:'small'},{km:115,t:'medium',n:'浜名湖・弁天島'},{km:133,t:'small'},{km:160,t:'small'},{km:168,t:'medium',n:'岡崎城'},{km:186,t:'small'},{km:195,t:'large',n:'名古屋城'}];
const zones=[{n:'ウォームアップ',c:'#9CC3FF',max:108},{n:'脂肪燃焼',c:'#16B978',max:132},{n:'有酸素',c:'#F6C544',max:150},{n:'全力',c:'#FF8A3D',max:168},{n:'最大',c:'#FF5872',max:999}];
let st={
  km:8.2,sess:0,t:720,cal:96,hr:123,mx:28.4,rpm:58,running:true,
  display:'detail',input:'sensor',
  route:[[138.3015,34.8447],[138.3041,34.8409],[138.3090,34.8368],[138.3152,34.8335],[138.3232,34.8291],[138.3330,34.8250],[138.3425,34.8215],[138.3565,34.8188]],
  routeDist:0,
  buildingsOn:false, buildingLayerIds:[],
  terrainOn:false, terrainReady:false,
  labelsOn:true, symbolLayerIds:[]
};
let map=null, marker=null;
const ROUTES_KEY='japanRide.myRoutes.v1';
let draftMarkers=[];
const $=id=>document.getElementById(id);

function setupDots(){
 const dots=$('dots'); if(!dots)return;
 dots.innerHTML='';
 CP.forEach(c=>{let d=document.createElement('div');d.className='dot '+c.t;d.style.left=(c.km/LEG*100)+'%';dots.appendChild(d);});
}
function zoneOf(hr){for(let i=0;i<zones.length;i++)if(hr<zones[i].max)return i;return 4}
function next(t){return CP.find(c=>c.t===t&&c.km>st.km+.01)}
function fmtTime(sec){return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(Math.floor(sec%60)).padStart(2,'0')}
function hav(a,b){const R=6371e3,toRad=x=>x*Math.PI/180; const dLat=toRad(b[1]-a[1]),dLon=toRad(b[0]-a[0]); const lat1=toRad(a[1]),lat2=toRad(b[1]); const h=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2; return 2*R*Math.asin(Math.sqrt(h));}
function routeLength(coords){let d=0;for(let i=1;i<coords.length;i++)d+=hav(coords[i-1],coords[i]);return d;}

function renderUI(){
 const kmh=st.rpm*2*2.1/60*3.6;
 const prog=Math.min(100,st.km/LEG*100);
 const z=zoneOf(st.hr);
 const nS=next('small'),nM=next('medium'),nL=next('large');
 if($('speed'))$('speed').textContent=kmh.toFixed(1);
 const rpmRatio=Math.max(0,Math.min(1,st.rpm/120));
 if($('ringValue'))$('ringValue').textContent=Math.round(st.rpm);
 if($('ringMain'))$('ringMain').textContent=Math.round(st.rpm)+' rpm';
 if($('cadenceRing')){
   const C=2*Math.PI*18;
   $('cadenceRing').setAttribute('stroke-dasharray', C.toFixed(1));
   $('cadenceRing').setAttribute('stroke-dashoffset', (C*(1-rpmRatio)).toFixed(1));
 }
 if($('mode'))$('mode').textContent=st.running?'追従 ON':'追従 OFF';
 if($('remain'))$('remain').textContent='あと '+(nL?(nL.km-st.km).toFixed(1):'0.0')+' km';
 if($('fill'))$('fill').style.width=prog+'%';
 if($('bike'))$('bike').style.left=prog+'%';
 if($('smallGoal'))$('smallGoal').textContent=nS?'通過地点 '+(nS.km-st.km).toFixed(1)+'km':'通過地点 —';
 if($('mediumGoal'))$('mediumGoal').textContent=nM?'中継地 '+nM.n+' '+(nM.km-st.km).toFixed(0)+'km':'中継地 —';
 const stats=[['距離',st.sess.toFixed(2),'km'],['時間',fmtTime(st.t),''],['消費',Math.round(st.cal),'kcal'],['最高',st.mx.toFixed(1),'km/h'],['XP',Math.round(st.cal*0.9),''],['累計',st.km.toFixed(1),'km']];
 if($('metrics'))$('metrics').innerHTML=stats.map(a=>`<div class="dock-card"><div class="label">${a[0]}</div><div class="value">${a[1]}<span class="unit">${a[2]}</span></div></div>`).join('');
 if($('metrics2'))$('metrics2').innerHTML='';
 if($('pedalRpm'))$('pedalRpm').textContent=Math.round(st.rpm);
 if($('zoneBpm'))$('zoneBpm').textContent=Math.round(st.hr);
 if($('zoneMain')){
   $('zoneMain').childNodes[0].nodeValue=zones[z].n;
   $('zoneMain').style.color=zones[z].c;
 }
 if($('zoneDot'))$('zoneDot').style.background=zones[z].c;
 if($('bars'))$('bars').innerHTML=zones.map((zz,i)=>`<div class="zone-seg ${i===z?'active':''}" style="background:${zz.c}"></div>`).join('');
 if($('zoneGuide'))$('zoneGuide').innerHTML='<span class="zone-name">今は'+zones[z].n+'ゾーンです</span><span class="zone-tip">'+(z>=3?'無理しすぎに注意':'')+'</span>';
 if($('mapHudSpeed'))$('mapHudSpeed').textContent=kmh.toFixed(1);
 if($('mapHudTime'))$('mapHudTime').textContent=fmtTime(st.t);
 if($('mapHudDist'))$('mapHudDist').textContent=st.sess.toFixed(2);
}

function setDisplay(mode){
 st.display=mode;
 const phone=document.querySelector('.phone');
 phone.classList.toggle('compact',mode==='compact');
 phone.classList.toggle('maponly',mode==='maponly');
 if($('displayToggle'))$('displayToggle').textContent=mode==='detail'?'簡易表示':mode==='compact'?'地図ビュー':'詳細表示';
 if($('displayFloat'))$('displayFloat').textContent=mode==='compact'?'地図ビュー':'UI表示';
 const panel=$('mapToolsPanel');
 if(panel) panel.classList.toggle('open', mode==='maponly');
 if(map) setTimeout(()=>map.resize(),80);
}
function cycleDisplay(){setDisplay(st.display==='detail'?'compact':st.display==='compact'?'maponly':'detail')}
function setInput(mode){
 st.input=mode;
 document.querySelector('.phone').classList.toggle('manual',mode==='manual');
 if($('inputModeToggle'))$('inputModeToggle').textContent=mode==='manual'?'手動入力':'センサー入力';
}
function toggleInput(){setInput(st.input==='sensor'?'manual':'sensor')}

function syncBuildingTerrainButtons(){
 const b=$('buildingTogglePanel');
 if(b){
   b.textContent=st.buildingsOn?'建物 ON':'建物 OFF';
   b.classList.toggle('on',st.buildingsOn);
   b.classList.remove('err');
 }
 const t=$('terrainTogglePanel');
 if(t){
   t.textContent=st.terrainOn?'地形 ON':'地形 OFF';
   t.classList.toggle('on',st.terrainOn);
   t.classList.remove('err');
 }
}

function initMap(){
 if(!window.maplibregl){
   if($('mode'))$('mode').textContent='MapLibre読込失敗';
   return;
 }
 map=new maplibregl.Map({
   container:'map',
   style:'https://tiles.openfreemap.org/styles/liberty',
   center:[138.309,34.835],
   zoom:15.8,
   pitch:58,
   bearing:50,
   antialias:true,
   dragRotate:true,
   touchZoomRotate:true,
   cooperativeGestures:false
 });
 map.touchZoomRotate.enable();
 map.touchZoomRotate.enableRotation();
 map.dragRotate.enable();
 map.scrollZoom.enable();
 map.doubleClickZoom.enable();
 map.keyboard.enable();

 map.on('error',e=>console.warn('map error', e && e.error ? e.error : e));

 map.on('load',()=>{
   const layers=map.getStyle().layers||[];
   const firstSym=layers.find(l=>l.type==='symbol');
   const beforeId=firstSym ? firstSym.id : undefined;

   try{
     if(!map.getSource('gsi-photo')){
       map.addSource('gsi-photo',{
         type:'raster',
         tiles:['https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg'],
         tileSize:256,
         attribution:'地理院タイル'
       });
     }
     if(!map.getLayer('gsi-photo')){
       map.addLayer({id:'gsi-photo',type:'raster',source:'gsi-photo',paint:{'raster-opacity':1}}, beforeId);
     }
   }catch(e){console.warn('gsi photo failed',e)}

   st.symbolLayerIds=(map.getStyle().layers||[]).filter(l=>l.type==='symbol').map(l=>l.id);
   st.symbolLayerIds.forEach(id=>{
     try{
       map.setPaintProperty(id,'text-halo-color','rgba(255,255,255,.95)');
       map.setPaintProperty(id,'text-halo-width',2.1);
       map.setPaintProperty(id,'text-halo-blur',0.25);
     }catch(e){}
   });

   hideAllBuilding3DOnLoad();

   const el=document.createElement('div');
   el.style.width='24px';
   el.style.height='24px';
   el.style.borderRadius='50%';
   el.style.background='#2f6bff';
   el.style.border='4px solid white';
   el.style.boxShadow='0 2px 10px rgba(0,0,0,.35)';
   marker=new maplibregl.Marker({element:el}).setLngLat(st.route[0]).addTo(map);

   st.routeDist=routeLength(st.route);
   if(!map.getSource('route')){
     map.addSource('route',{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:st.route}}});
   }
   const firstSymbolNow=(map.getStyle().layers||[]).find(l=>l.type==='symbol');
   const routeBefore=firstSymbolNow ? firstSymbolNow.id : undefined;
   try{map.addLayer({id:'route-glow',type:'line',source:'route',paint:{'line-color':'#ffffff','line-width':9,'line-opacity':0.82}}, routeBefore);}catch(e){}
   try{map.addLayer({id:'route',type:'line',source:'route',paint:{'line-color':'#2f6bff','line-width':5,'line-opacity':0.96}}, routeBefore);}catch(e){}

   syncBuildingTerrainButtons();
   map.on('click',e=>{if(st.routeEdit)addDraftPoint(e.lngLat)});
 });
}

function collectExistingBuildingLayers(){
 if(!map) return [];
 const ids=[];
 (map.getStyle().layers||[]).forEach(l=>{
   if(l.type==='fill-extrusion') ids.push(l.id);
 });
 return ids;
}

function hideAllBuilding3DOnLoad(){
 st.buildingLayerIds=collectExistingBuildingLayers();
 st.buildingLayerIds.forEach(id=>{
   try{map.setLayoutProperty(id,'visibility','none')}catch(e){}
 });
 st.buildingsOn=false;
 syncBuildingTerrainButtons();
}

function findVectorSourceForBuildings(){
 const sources=(map.getStyle()&&map.getStyle().sources)||{};
 for(const id of Object.keys(sources)){
   const src=sources[id]||{};
   const s=JSON.stringify(src).toLowerCase();
   if(src.type==='vector' && (s.includes('openfreemap') || s.includes('openmaptiles') || s.includes('tiles.openfreemap'))) return id;
 }
 const vectorIds=Object.keys(sources).filter(id=>sources[id]&&sources[id].type==='vector');
 return vectorIds.length ? vectorIds[0] : null;
}

function ensureBuildingLayer(){
 if(!map || !map.isStyleLoaded()) return false;

 const existing=collectExistingBuildingLayers();
 if(existing.length){
   st.buildingLayerIds=existing;
   return true;
 }

 const sourceId=findVectorSourceForBuildings();
 if(!sourceId) return false;

 const firstSymbol=(map.getStyle().layers||[]).find(l=>l.type==='symbol');
 const beforeId=firstSymbol ? firstSymbol.id : undefined;

 const candidates=['building','buildings'];
 for(const sourceLayer of candidates){
   const id='ofm-building-3d-'+sourceLayer;
   try{
     if(!map.getLayer(id)){
       map.addLayer({
         id,
         type:'fill-extrusion',
         source:sourceId,
         'source-layer':sourceLayer,
         minzoom:14,
         layout:{visibility:'none'},
         paint:{
           'fill-extrusion-color':'rgba(80,92,110,.46)',
           'fill-extrusion-height':['case',['has','render_height'],['get','render_height'],['has','height'],['get','height'],12],
           'fill-extrusion-base':['case',['has','render_min_height'],['get','render_min_height'],0],
           'fill-extrusion-opacity':0.34
         }
       }, beforeId);
     }
     st.buildingLayerIds=[id];
     return true;
   }catch(e){}
 }
 return false;
}

function toggleBuildings(){
 const btn=$('buildingTogglePanel');
 if(!map || !map.isStyleLoaded()){
   if(btn){btn.textContent='読込中';btn.classList.add('err')}
   return;
 }
 if(!ensureBuildingLayer()){
   if(btn){btn.textContent='建物不可';btn.classList.add('err')}
   return;
 }
 st.buildingsOn=!st.buildingsOn;
 st.buildingLayerIds.forEach(id=>{
   try{map.setLayoutProperty(id,'visibility',st.buildingsOn?'visible':'none')}catch(e){}
 });
 syncBuildingTerrainButtons();
}

function ensureTerrainSource(){
 if(!map || !map.isStyleLoaded()) return false;
 try{
   if(!map.getSource('terrain-dem')){
     map.addSource('terrain-dem',{
       type:'raster-dem',
       tiles:['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
       tileSize:256,
       maxzoom:15,
       encoding:'terrarium',
       attribution:'Terrain tiles by Mapzen'
     });
   }
   st.terrainReady=true;
   return true;
 }catch(e){
   console.warn('terrain source failed',e);
   return false;
 }
}

function toggleTerrain(){
 const btn=$('terrainTogglePanel');
 if(!map || !map.isStyleLoaded()){
   if(btn){btn.textContent='読込中';btn.classList.add('err')}
   return;
 }
 if(!st.terrainOn){
   if(!ensureTerrainSource()){
     if(btn){btn.textContent='地形不可';btn.classList.add('err')}
     return;
   }
   try{
     map.setTerrain({source:'terrain-dem', exaggeration:1.5});
     // pitchを少し起こさないと高低差が見えにくいので、D32同様に3D視点を維持
     map.easeTo({pitch:60,duration:350});
     st.terrainOn=true;
   }catch(e){
     console.warn('setTerrain failed',e);
     if(btn){btn.textContent='地形不可';btn.classList.add('err')}
     return;
   }
 }else{
   try{map.setTerrain(null)}catch(e){}
   st.terrainOn=false;
 }
 syncBuildingTerrainButtons();
}

function recenterToBike(){
 if(!map) return;
 const p=marker ? marker.getLngLat().toArray() : st.route[0];
 map.easeTo({center:p,zoom:15.8,pitch:58,bearing:50,duration:420});
}


function loadMyRoutes(){
 try{return JSON.parse(localStorage.getItem(ROUTES_KEY)||'[]')}catch(e){return []}
}
function saveMyRoutes(routes){
 localStorage.setItem(ROUTES_KEY, JSON.stringify(routes));
}
function routeDistanceKm(coords){
 if(!coords || coords.length<2) return 0;
 return routeLength(coords)/1000;
}
function renderMyRoutes(){
 const list=$('myRouteList');
 if(!list) return;
 const routes=loadMyRoutes();
 if(!routes.length){
   list.innerHTML='<div class="route-empty">まだ保存したルートはありません。<br>「新しいルートを作る」から地図をタップして作成できます。</div>';
   return;
 }
 list.innerHTML=routes.map(r=>`
  <div class="route-item">
    <div class="route-item-top">
      <div>
        <strong>${escapeHtml(r.name||'無題のルート')}</strong>
        <small>${(r.distanceKm||0).toFixed(2)}km ・ ${r.points.length}地点</small>
      </div>
    </div>
    <div class="route-item-actions">
      <button class="route-use" data-use-route="${r.id}">このルートを走る</button>
      <button class="route-delete" data-delete-route="${r.id}">削除</button>
    </div>
  </div>`).join('');
}
function escapeHtml(str){
 return String(str).replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function ensureDraftRouteLayer(){
 if(!map || !map.isStyleLoaded()) return;
 if(!map.getSource('draft-route')){
   map.addSource('draft-route',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
 }
 const firstSymbol=(map.getStyle().layers||[]).find(l=>l.type==='symbol');
 const beforeId=firstSymbol ? firstSymbol.id : undefined;
 if(!map.getLayer('draft-route-line')){
   map.addLayer({
     id:'draft-route-line',
     type:'line',
     source:'draft-route',
     paint:{'line-color':'#ff5872','line-width':6,'line-opacity':0.95}
   }, beforeId);
 }
}
function renderDraftRoute(){
 if(!map || !map.isStyleLoaded()) return;
 ensureDraftRouteLayer();
 const features=[];
 if(st.draftRoute && st.draftRoute.length>=2){
   features.push({type:'Feature',geometry:{type:'LineString',coordinates:st.draftRoute},properties:{}});
 }
 const src=map.getSource('draft-route');
 if(src) src.setData({type:'FeatureCollection',features});
 draftMarkers.forEach(m=>m.remove());
 draftMarkers=[];
 (st.draftRoute||[]).forEach((p,i)=>{
   const el=document.createElement('div');
   el.className='draft-point-marker';
   el.title=String(i+1);
   draftMarkers.push(new maplibregl.Marker({element:el}).setLngLat(p).addTo(map));
 });
 updateDraftStats();
}
function updateDraftStats(){
 const pts=st.draftRoute||[];
 if($('draftPointCount')) $('draftPointCount').textContent=pts.length;
 if($('draftDistance')) $('draftDistance').textContent=routeDistanceKm(pts).toFixed(2)+'km';
}
function startRouteEdit(){
 if(!map || !map.isStyleLoaded()) return;
 st.routeEdit=true;
 st.draftRoute=[];
 document.querySelector('.phone').classList.add('route-editing');
 setDisplay('maponly');
 if($('routeNameInput')) $('routeNameInput').value='';
 setRouteTip('地図をタップしてルート点を追加');
 ensureDraftRouteLayer();
 renderDraftRoute();
 if($('mapToolsPanel')) $('mapToolsPanel').classList.add('open');
 setTimeout(()=>map.resize(),80);
}
function exitRouteEdit(){
 st.routeEdit=false;
 document.querySelector('.phone').classList.remove('route-editing');
 st.draftRoute=[];
 renderDraftRoute();
 setDisplay('detail');
 renderMyRoutes();
}
function addDraftPoint(lngLat){
 if(!st.routeEdit) return;
 st.draftRoute=st.draftRoute||[];
 st.draftRoute.push([Number(lngLat.lng.toFixed(6)), Number(lngLat.lat.toFixed(6))]);
 renderDraftRoute();
}
function undoDraftPoint(){
 if(!st.routeEdit) return;
 (st.draftRoute||[]).pop();
 renderDraftRoute();
 setRouteTip('地図をタップしてルート点を追加');
}
function clearDraftRoute(){
 if(!st.routeEdit) return;
 st.draftRoute=[];
 renderDraftRoute();
 setRouteTip('地図をタップしてルート点を追加');
}
function saveDraftRoute(){
 const pts=st.draftRoute||[];
 if(pts.length<2){
   alert('2地点以上タップしてから保存してください');
   return;
 }
 const nameInput=$('routeNameInput');
 const name=(nameInput && nameInput.value.trim()) || 'マイルート '+new Date().toLocaleDateString('ja-JP');
 const routes=loadMyRoutes();
 const route={id:'r'+Date.now(), name, points:pts, distanceKm:routeDistanceKm(pts), createdAt:new Date().toISOString()};
 routes.unshift(route);
 saveMyRoutes(routes);
 useMyRoute(route.id, false);
 exitRouteEdit();
 setTabTo('routes');
 renderMyRoutes();
}
function setTabTo(tab){
 document.querySelectorAll('.bottom-tab').forEach(b=>b.classList.toggle('active',b.dataset.mainTab===tab));
 ['routes','records','settings'].forEach(t=>{
   const p=document.getElementById(t+'Page');
   if(p)p.classList.toggle('open',tab===t);
 });
}
function updateMainRouteOnMap(){
 if(!map || !map.isStyleLoaded()) return;
 const src=map.getSource('route');
 if(src){
   src.setData({type:'Feature',geometry:{type:'LineString',coordinates:st.route}});
 }
 if(marker && st.route && st.route[0]) marker.setLngLat(st.route[0]);
 st.routeDist=routeLength(st.route);
}
function useMyRoute(id, closePage=true){
 const routes=loadMyRoutes();
 const route=routes.find(r=>r.id===id);
 if(!route) return;
 st.route=route.points;
 updateMainRouteOnMap();
 if(map && route.points.length){
   const b=route.points.reduce((bb,p)=>{
     bb[0]=Math.min(bb[0],p[0]);bb[1]=Math.min(bb[1],p[1]);bb[2]=Math.max(bb[2],p[0]);bb[3]=Math.max(bb[3],p[1]);
     return bb;
   },[Infinity,Infinity,-Infinity,-Infinity]);
   try{map.fitBounds([[b[0],b[1]],[b[2],b[3]]],{padding:80,duration:500,pitch:58,bearing:50})}catch(e){}
 }
 if(closePage){
   setTabTo('ride');
   setDisplay('detail');
 }
}
function deleteMyRoute(id){
 const routes=loadMyRoutes().filter(r=>r.id!==id);
 saveMyRoutes(routes);
 renderMyRoutes();
}


function setRouteTip(text, cls=''){
 const tip=document.querySelector('.route-editor-tip');
 if(!tip) return;
 tip.classList.remove('snap-ok','snap-warn','snap-err');
 if(cls) tip.classList.add(cls);
 tip.textContent=text;
}
function compressRoutePoints(points, maxPoints=25){
 if(points.length<=maxPoints) return points;
 const result=[];
 for(let i=0;i<maxPoints;i++){
   const idx=Math.round(i*(points.length-1)/(maxPoints-1));
   result.push(points[idx]);
 }
 return result;
}
async function snapDraftRouteToRoad(){
 if(!st.routeEdit) return;
 const pts=st.draftRoute||[];
 if(pts.length<2){
   setRouteTip('2地点以上タップしてから「道に合わせる」を押してください','snap-warn');
   return;
 }
 const btn=$('snapRouteBtn');
 if(btn){btn.disabled=true;btn.textContent='補正中...'}
 setRouteTip('道路に沿うルートへ補正中...','snap-warn');
 const original=pts.slice();
 const queryPts=compressRoutePoints(pts, 25);
 const coord=queryPts.map(p=>p[0]+','+p[1]).join(';');
 const profiles=['bike','foot','driving'];
 let lastErr=null;
 for(const profile of profiles){
   try{
     const url=`https://router.project-osrm.org/route/v1/${profile}/${coord}?overview=full&geometries=geojson&alternatives=false&steps=false`;
     const res=await fetch(url);
     if(!res.ok) throw new Error('HTTP '+res.status);
     const data=await res.json();
     if(data.code!=='Ok' || !data.routes || !data.routes[0] || !data.routes[0].geometry){
       throw new Error(data.message || data.code || 'route failed');
     }
     const coords=data.routes[0].geometry.coordinates;
     if(!coords || coords.length<2) throw new Error('empty geometry');
     st.draftRoute=coords.map(p=>[Number(p[0]),Number(p[1])]);
     renderDraftRoute();
     setRouteTip(`道路沿いに補正しました（${profile} / ${routeDistanceKm(st.draftRoute).toFixed(2)}km）`,'snap-ok');
     if(btn){btn.disabled=false;btn.textContent='道に合わせる'}
     return;
   }catch(e){
     lastErr=e;
   }
 }
 st.draftRoute=original;
 renderDraftRoute();
 setRouteTip('道路補正に失敗しました。点を少し減らすか、道路上に近い位置で試してください','snap-err');
 if(btn){btn.disabled=false;btn.textContent='道に合わせる'}
 console.warn('snap route failed', lastErr);
}

document.addEventListener('click',e=>{
 const mainTab=e.target.closest('[data-main-tab]');
 if(mainTab){
   const tab=mainTab.dataset.mainTab;
   setTabTo(tab);
   if(tab==='routes') renderMyRoutes();
   return;
 }


 if(e.target.closest('#startRouteEditBtn')){startRouteEdit();return}
 if(e.target.closest('#exitRouteEditBtn')){exitRouteEdit();return}
 if(e.target.closest('#undoRoutePointBtn')){undoDraftPoint();return}
 if(e.target.closest('#clearRouteBtn')){clearDraftRoute();return}
 if(e.target.closest('#snapRouteBtn')){snapDraftRouteToRoad();return}
 if(e.target.closest('#saveRouteBtn')){saveDraftRoute();return}
 const useBtn=e.target.closest('[data-use-route]');
 if(useBtn){useMyRoute(useBtn.dataset.useRoute);return}
 const delBtn=e.target.closest('[data-delete-route]');
 if(delBtn){deleteMyRoute(delBtn.dataset.deleteRoute);return}

 if(e.target.closest('#buildingTogglePanel')){toggleBuildings();return}
 if(e.target.closest('#terrainTogglePanel')){toggleTerrain();return}

 if(e.target.closest('#detailFromMapView')){setDisplay('detail');return}
 if(e.target.closest('#mapToolsToggle')){
   const p=$('mapToolsPanel');
   if(p)p.classList.toggle('open');
   return;
 }
 if(e.target.closest('#closeMapTools')){
   if(st.display==='maponly') return;
   const p=$('mapToolsPanel');
   if(p)p.classList.remove('open');
   return;
 }
 if(e.target.closest('#recenterBtn2')){recenterToBike();return}
 if(e.target.closest('#zoomInBtn')){if(map)map.easeTo({zoom:Math.min(18,map.getZoom()+1),duration:220});return}
 if(e.target.closest('#zoomOutBtn')){if(map)map.easeTo({zoom:Math.max(5,map.getZoom()-1),duration:220});return}

 if(e.target.closest('#displayToggle')){cycleDisplay();return}
 
 if(e.target.closest('#displayFloat')){if(st.display==='compact')setDisplay('maponly');else setDisplay('detail');return}
 if(e.target.closest('#inputModeToggle')){toggleInput();return}
 if(e.target.closest('#pedalUp')){st.rpm+=2;renderUI();return}
 if(e.target.closest('#pedalDown')){st.rpm=Math.max(0,st.rpm-2);renderUI();return}
 if(e.target.closest('#runBtnTop')){st.running=!st.running;$('runBtnTop').textContent=st.running?'ストップ':'再開';renderUI();return}
});

window.addEventListener('resize',()=>{if(map)map.resize()});
setupDots();
renderUI();
setDisplay('detail');
setInput('sensor');
initMap();
renderMyRoutes();
</script></body>
</html>

<style>
:root{--display-font:'Corporate Logo Rounded','Corporate Logo Round','CorpRound','Kosugi Maru','M PLUS Rounded 1c','Hiragino Maru Gothic ProN',ui-rounded,sans-serif;--ink:#17202c;--sub:#6f7785;--blue:#2f6bff;--green:#12b77a;--coral:#ff5872;--gold:#d59b2b;--line:#e4e8f0;}

t-overflow:ellipsis}.street-notice-btn{border:0;border-radius:999px;background:#2f6bff;color:#fff;font-size:10px;font-weight:900;padding:7px 10px}.street-view-panel{position:absolute;z-index:19;left:10px;right:10px;bottom:calc(env(safe-area-inset-bottom) + 152px);display:none;border-radius:20px;background:rgba(255,255,255,.96);border:1px solid rgba(255,255,255,.82);box-shadow:0 14px 34px rgba(0,0,0,.28);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:10px;pointer-events:auto}.street-view-panel.open{display:block}.street-view-head{display:flex;align-items:center;justify-content:space-between;gap:8px}.street-kicker{font-size:9px;font-weight:900;color:#6b7280}.street-view-title{font-size:15px;font-weight:900;color:#111827}.street-close{width:30px;height:30px;border:0;border-radius:999px;background:#eef2f7;color:#111827;font-weight:900}.street-view-body{margin-top:8px;border-radius:15px;overflow:hidden;background:#111827}.street-road{position:relative;height:210px;overflow:hidden;background:linear-gradient(#91c5ef 0 42%,#425b3a 42% 56%,#24272d 56% 100%)}.street-road .sky{position:absolute;inset:0;background:radial-gradient(circle at 68% 18%,rgba(255,255,255,.9) 0 7%,transparent 8%),linear-gradient(#91c5ef 0 45%,transparent 45%)}.street-road .road{position:absolute;left:18%;right:18%;bottom:-28%;height:80%;background:linear-gradient(90deg,#17191d,#3b3f46 48%,#17191d);clip-path:polygon(38% 0,62% 0,100% 100%,0 100%)}.street-road .centerline{position:absolute;left:49%;top:8%;width:2%;height:100%;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.8) 0 18px,transparent 18px 38px);transform:perspective(160px) rotateX(32deg);transform-origin:top}.street-caption{position:absolute;left:10px;right:10px;bottom:10px;border-radius:999px;background:rgba(17,24,39,.72);color:#fff;font-size:10px;font-weight:900;padding:7px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.street-pin{width:15px;height:15px;border-radius:50%;background:#ff2 /* D案：Cの整理感 + Bの景色面積。上下とも薄く浮かせる */

/* 上部の速度・現在地 */
.top-chips{display:flex;align-items:center;justify-content:flex-start;gap:8px;margin-top:7px}.meter-row{display:grid;grid-template-columns:auto minmax(0,1fr) minmax(104px,.86fr);gap:6px;margin-bottom:4px}.speed-chip{display:flex;align-items:center;justify-content:center;background:rgba(20,24,32,.92);color:#fff;border-radius:18px;padding:6px 12px;min-width:140px;box-shadow:0 8px 18px rgba(0,0,0,.22);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.speed-num{font-family:var(--display-font);font-size:30px;line-height:1;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.03em}.speed-unit{font-size:11px;font-weight:900;opacity:.88;margin-left:6px}.place{max-width:62%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.86);border-radius:999px;padding:6px 10px;font-size:10px;font-weight:900;box-shadow:0 6px 14px rgba(0,0,0,.13);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.label-toggle{pointer-events:auto;cursor:pointer;border:0;background:rgba(20,24,32,.72);color:#fff;border-radius:999px;padding:6px 10px;font-size:10px;font-weight:900;box-shadow:0 6px 14px rgba(0,0,0,.13);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.label-toggle.off{background:rgba(255,255,255,.78);color:#111827}.label-toggle.warn{background:#b45309;color:#fff}.ring-card{min-width:0;border-radius:18px;background:linear-gradient(180deg,#fff,#f7f9fd);border:1px solid #e3e7ef;box-shadow:0 1px 2px rgba(20,30,60,.04),0 4px 8px rgba(20,30,60,.04),inset 0 1px 0 rgba(255,255,255,.92);padding:4px 8px;display:flex;align-items:center;justify-content:center}.ring-wrap{display:flex;align-items:center;gap:8px;width:100%}.ring-svg{width:44px;height:44px;flex:0 0 44px}.ring-track{stroke:#d9deea;stroke-width:7;fill:none}.ring-progress{stroke:#16B978;stroke-width:7;fill:none;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%}.ring-value{font-size:16px;font-weight:900;fill:#111827}.ring-labels{min-width:0;display:flex;flex-direction:column;line-height:1}.ring-main{font-size:15px;font-weight:900;color:#111827;font-variant-numeric:tabular-nums}.ring-sub{font-size:8.5px;font-weight:900;color:#6b7280;margin-top:2px}.action-card{padding:0!important;overflow:hidden}.action-btn{width:100%;height:100%;min-height:56px;border:0;border-radius:16px;background:#ff5d6c;color:#fff;font-size:15px;font-weight:900;letter-spacing:.02em;padding:0 8px;box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}.action-btn.stop{background:#ef4444}
.bottom{pointer-events:none;display:flex;flex-direction:column;gap:3px}.mini-dock{position:relative;pointer-events:auto;border-radius:20px;background:linear-gradient(180deg,rgba(247,249,253,.92),rgba(232,236,245,.88));border:1px solid rgba(255,255,255,.78);box-shadow:0 -5px 18px rgba(0,0,0,.14),inset 0 1px 0 rgba(255,255,255,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:5px 5px 4px}.zone-card{border-radius:17px;background:linear-gradient(180deg,#fff,#f7f9fd);border:1px solid #e3e7ef;box-shadow:0 1px 2px rgba(20,30,60,.04),0 5px 10px rgba(20,30,60,.04),inset 0 1px 0 rgba(255,255,255,.92);padding:6px 8px 5px}.zone-head{display:flex;align-items:center;justify-content:space-between;gap:8px}.zone-left{display:flex;align-items:center;gap:8px;min-width:0}.zone-dot{width:14px;height:14px;border-radius:50%;background:#16B978;box-shadow:0 0 0 2px rgba(22,185,120,.12)}.zone-kicker{font-size:9px;font-weight:900;color:var(--sub);letter-spacing:.02em}.zone-main{font-family:var(--display-font);font-size:18px;line-height:1.0;font-weight:900;color:#14b46f;letter-spacing:.02em;white-space:nowrap}.zone-fire{font-size:20px;margin-left:5px}.zone-bpm{display:flex;align-items:flex-end;gap:4px;white-space:nowrap}.zone-bpm .num{font-size:22px;line-height:1;font-weight:900;color:var(--coral);font-variant-numeric:tabular-nums}.zone-bpm .u{font-size:10px;font-weight:900;color:var(--sub);padding-bottom:4px}.zone-line{height:7px;display:flex;gap:5px;margin-top:6px}.zone-seg{flex:1;border-radius:999px;opacity:.22}.zone-seg.active{opacity:1;box-shadow:0 0 0 1px rgba(255,255,255,.8) inset, 0 1px 4px rgba(0,0,0,.08)}.zone-guide{margin-top:4px;font-size:8.8px;line-height:1.2;font-weight:900;color:#596273}.zone-guide .zone-name{display:inline-block;margin-right:6px;color:#111827}.zone-guide .zone-tip{color:#667085}.dock-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:4px;margin-top:4px}.dock-card{min-width:0;border-radius:15px;background:linear-gradient(180deg,#fff,#f6f8fc);border:1px solid #e3e7ef;box-shadow:0 1px 2px rgba(20,30,60,.04),0 4px 8px rgba(20,30,60,.04),inset 0 1px 0 rgba(255,255,255,.92);padding:5px 6px 4px;cursor:pointer}.dock-card.tap{position:relative}.dock-card.tap:after{content:'+';position:absolute;right:8px;top:6px;font-size:12px;font-weight:900;color:#a4abbb}.dock-card.tap.open:after{content:'–'}.label{font-size:8.5px;font-weight:900;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.value{font-size:15px;line-height:1.0;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.02em;margin-top:1px}.unit{font-size:8px;color:var(--sub);font-weight:900;margin-left:1px}.hr .value{color:var(--coral)}.secondary-wrap{overflow:hidden;max-height:0;opacity:0;transform:translateY(-6px);transition:max-height .24s ease, opacity .2s ease, transform .24s ease}.secondary-wrap.open{max-height:92px;opacity:1;transform:translateY(0)}.mini-note{display:none}.control-row{display:flex;align-items:center;gap:8px;margin-top:4px}.control-row input{width:100%;accent-color:var(--blue);height:18px}.pill{border:0;border-radius:999px;background:#171b23;color:#fff;font-size:8.5px;font-weight:900;padding:5px 8px;white-space:nowrap}.maplibregl-ctrl-bottom-left{display:none!important}.maplibregl-ctrl-bottom-right{bottom:calc(env(safe-area-inset-bottom) + 12px)!important;right:10px!important;opacity:.78}.maplibregl-ctrl-bottom-right{bottom:calc(env(safe-area-inset-bottom) + 10px)!important;right:8px!important}.maplibregl-ctrl-group{border-radius:14px!important;overflow:hidden!important}
@media(max-height:740px){.right-map-tools{right:10px;bottom:calc(env(safe-area-inset-bottom) + 250px);gap:5px}.recenter-btn{width:42px;height:42px}.recenter-svg{width:42px;height:42px}.building-fab,.terrain-fab,.street-fab{font-size:9px;padding:6px 8px;min-width:58px}.hero{padding:8px 10px}.hero-icon{width:38px;height:38px;border-radius:15px;font-size:21px}.landmark{font-size:26px}.remain{font-size:12px}.subgoals{font-size:9.5px}.top-chips{margin-top:6px}.meter-row{grid-template-columns:auto minmax(0,1fr) minmax(98px,.84fr);gap:5px}.speed-chip{min-width:132px;padding:6px 10px}.speed-num{font-size:28px}.speed-unit{font-size:10px}.ring-svg{width:40px;height:40px}.ring-main{font-size:14px}.action-btn{min-height:52px;font-size:14px}.mini-dock{padding:4px}.zone-main{font-size:17px}.zone-bpm .num{font-size:21px}.dock-grid{gap:4px}.dock-card{padding:4px}.value{font-size:14px}.zone-guide{font-size:8.6px}.maplibregl-ctrl-bottom-right{bottom:calc(env(safe-area-inset-bottom) + 12px)!important}}@media(max-width:370px){.right-map-tools{right:9px;bottom:calc(env(safe-area-inset-bottom) + 236px);gap:5px}.recenter-btn{width:40px;height:40px}.recenter-svg{width:40px;height:40px}.building-fab,.terrain-fab,.street-fab{font-size:9px;padding:6px 7px;min-width:56px}.landmark{font-size:25px}.top-chips{gap:6px}.meter-row{grid-template-columns:auto minmax(0,1fr) minmax(92px,.82fr);gap:4px}.speed-chip{min-width:118px;padding:5px 8px}.speed-num{font-size:25px}.speed-unit{font-size:9px}.ring-svg{width:38px;height:38px}.ring-main{font-size:13px}.action-btn{min-height:48px;font-size:13px}.dock-grid{grid-template-columns:repeat(3,1fr);gap:4px}.value{font-size:14px}.label{font-size:8px}.place{display:none}.mode{display:none}.maplibregl-ctrl-bottom-right{bottom:calc(env(safe-area-inset-bottom) + 10px)!important;right:8px!important}}

/* D38: 現地ビューは小窓ではなく背景全体を切り替える */
.street-notice{
  top:calc(env(safe-area-inset-top) + 154px)!important;
  left:12px!important;
  right:12px!important;
  z-index:21!important;
}
.street-notice-main{font-size:11.5px!important}
.street-notice-btn{background:#2f6bff!important}
.street-full{
  position:absolute;
  inset:0;
  z-index:3;
  display:none;
  overflow:hidden;
  background:#111827;
  pointer-events:none;
}
.street-full.open{display:block}
.street-full-bg{
  position:absolute;
  inset:0;
  background:linear-gradient(#82c7f4 0 42%,#47743c 42% 54%,#202329 54% 100%);
  overflow:hidden;
}
.street-sky{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 73% 16%,rgba(255,255,255,.95) 0 5%,rgba(255,255,255,.35) 6%,transparent 11%),
    linear-gradient(#82c7f4 0 44%,transparent 44%);
}
.street-mountains{
  position:absolute;
  left:-12%;
  right:-12%;
  top:31%;
  height:24%;
  background:linear-gradient(135deg,#315d46 0 30%,#406f4f 31% 52%,#2d513e 53% 72%,#4f814f 73%);
  clip-path:polygon(0 80%,10% 35%,24% 72%,35% 28%,50% 80%,63% 38%,77% 68%,91% 24%,100% 82%,100% 100%,0 100%);
  opacity:.9;
}
.street-side{
  position:absolute;
  bottom:0;
  width:45%;
  height:50%;
  background:linear-gradient(180deg,#4e8a45,#24331f);
  opacity:.95;
}
.street-side.left{left:-10%;clip-path:polygon(0 0,58% 0,100% 100%,0 100%)}
.street-side.right{right:-10%;clip-path:polygon(42% 0,100% 0,100% 100%,0 100%)}
.street-road-full{
  position:absolute;
  left:14%;
  right:14%;
  bottom:-22%;
  height:74%;
  background:linear-gradient(90deg,#15171b,#42464e 47%,#252830 52%,#15171b);
  clip-path:polygon(40% 0,60% 0,100% 100%,0 100%);
  box-shadow:0 -30px 60px rgba(0,0,0,.25);
}
.street-centerline{
  position:absolute;
  left:49.2%;
  top:2%;
  width:1.6%;
  height:100%;
  background:repeating-linear-gradient(to bottom,rgba(255,255,255,.88) 0 24px,transparent 24px 52px);
  transform:perspective(180px) rotateX(35deg);
  transform-origin:top;
  opacity:.86;
}
.street-full-caption{
  position:absolute;
  z-index:4;
  left:12px;
  right:12px;
  bottom:calc(env(safe-area-inset-bottom) + 136px);
  border-radius:999px;
  background:rgba(17,24,39,.72);
  color:white;
  font-size:11px;
  font-weight:900;
  padding:8px 11px;
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.pedal-control{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:5px;
  align-items:center;
  margin:5px 0;
}
.pedal-btn{
  border:0;
  border-radius:999px;
  background:#eef2f7;
  color:#17202c;
  font-size:11px;
  font-weight:900;
  padding:8px 6px;
}
.pedal-btn.plus{background:#e8f0ff;color:#2155d8}
.pedal-readout{
  min-width:62px;
  border-radius:999px;
  background:#fff;
  border:1px solid #e3e7ef;
  text-align:center;
  padding:6px 9px;
  font-size:14px;
  font-weight:900;
  color:#111827;
}
.pedal-readout small{font-size:9px;color:#6b7280;margin-left:2px}
@media(max-height:740px){
  .street-notice{top:calc(env(safe-area-inset-top) + 136px)!important}
  .pedal-control{margin:4px 0}
  .pedal-btn{font-size:10px;padding:6px 5px}
  .pedal-readout{padding:5px 8px}
}
@media(max-height:670px){
  .street-notice{top:calc(env(safe-area-inset-top) + 118px)!important}
  .street-full-caption{bottom:calc(env(safe-area-inset-bottom) + 118px)}
}



/* D62: old UI base restore + safe GSI map. */
.map{background:#172333!important;overflow:hidden!important}
.tile-layer{position:absolute;inset:0;z-index:0}
.tile{position:absolute;width:256px;height:256px;object-fit:cover;background:#223246}
.route-svg{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none}
.current-marker{position:absolute;z-index:3;width:26px;height:26px;border-radius:50%;background:#2f6bff;border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.35);display:grid;place-items:center;font-size:14px;transform:translate(-50%,-50%)}
#labelToggle{background:rgba(255,255,255,.78)!important;color:#111827!important}
#displayToggle,#inputModeToggle{pointer-events:auto}
.pedal-control{display:none!important}
.phone.manual .pedal-control{display:flex!important}
.map-restore{display:none;position:absolute;z-index:99999;right:14px;top:calc(env(safe-area-inset-top) + 14px);border:0;border-radius:999px;background:rgba(255,255,255,.94);color:#111827;font-size:13px;font-weight:900;padding:11px 15px;box-shadow:0 10px 24px rgba(0,0,0,.24);font-family:inherit}
.phone.compact .hero{padding:8px 10px!important}
.phone.compact .hero-icon,.phone.compact .eyebrow,.phone.compact .progress,.phone.compact .subgoals{display:none!important}
.phone.compact .hero-main{align-items:center!important}
.phone.compact .landmark{font-size:24px!important}
.phone.compact .remain{font-size:13px!important}
.phone.compact .top-chips{display:none!important}
.phone.compact .mini-dock{padding:5px!important}
.phone.compact .zone-line,.phone.compact .zone-guide,.phone.compact .dock-grid,.phone.compact .secondary-wrap{display:none!important}

<script>
const LEG=195;
const CP=[{km:0,t:'large',n:'三保松原'},{km:12,t:'small'},{km:27,t:'small'},{km:35,t:'medium',n:'大井川'},{km:52,t:'small'},{km:70,t:'medium',n:'掛川城'},{km:88,t:'small'},{km:104,t:'small'},{km:115,t:'medium',n:'浜名湖・弁天島'},{km:133,t:'small'},{km:160,t:'small'},{km:168,t:'medium',n:'岡崎城'},{km:186,t:'small'},{km:195,t:'large',n:'名古屋城'}];
const zones=[{n:'ウォームアップ',c:'#9CC3FF',max:108},{n:'脂肪燃焼',c:'#16B978',max:132},{n:'有酸素',c:'#F6C544',max:150},{n:'全力',c:'#FF8A3D',max:168},{n:'最大',c:'#FF5872',max:999}];
let st={km:8.2,sess:0,t:720,cal:96,hr:123,mx:28.4,rpm:58,running:true,display:'detail',input:'sensor',zoom:15,center:[138.3102,34.8362],route:[[138.3082,34.8377],[138.3088,34.8370],[138.3096,34.8365],[138.3105,34.8360],[138.3114,34.8356],[138.3121,34.8350]],street:false};
const $=id=>document.getElementById(id);
function setupDots(){CP.forEach(c=>{let d=document.createElement('div');d.className='dot '+c.t;d.style.left=(c.km/LEG*100)+'%';$('dots').appendChild(d);});}
function zoneOf(hr){for(let i=0;i<zones.length;i++)if(hr<zones[i].max)return i;return 4;}
function next(t){return CP.find(c=>c.t===t&&c.km>st.km+.01)}
function fmtTime(sec){return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(Math.floor(sec%60)).padStart(2,'0')}
function lonLatToTile(lon,lat,z){const n=2**z;return[(lon+180)/360*n,(1-Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*n]}
function tileToLonLat(x,y,z){const n=2**z;return[x/n*360-180,Math.atan(Math.sinh(Math.PI*(1-2*y/n)))*180/Math.PI]}
function project(lon,lat,center,z,w,h){const c=lonLatToTile(center[0],center[1],z),p=lonLatToTile(lon,lat,z);return[(p[0]-c[0])*256+w/2,(p[1]-c[1])*256+h/2]}
function renderTiles(){const el=$('tileLayer'), box=$('map'), w=box.clientWidth,h=box.clientHeight,z=st.zoom,c=lonLatToTile(st.center[0],st.center[1],z);let html='';const minX=Math.floor(c[0]-w/512)-1,maxX=Math.floor(c[0]+w/512)+1,minY=Math.floor(c[1]-h/512)-1,maxY=Math.floor(c[1]+h/512)+1;for(let x=minX;x<=maxX;x++){for(let y=minY;y<=maxY;y++){const l=(x-c[0])*256+w/2,t=(y-c[1])*256+h/2;html+=`<img class="tile" draggable="false" src="https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/${z}/${x}/${y}.jpg" style="left:${l}px;top:${t}px" onerror="this.src='https://cyberjapandata.gsi.go.jp/xyz/std/${z}/${x}/${y}.png'">`;}}el.innerHTML=html;}
function renderRoute(){const svg=$('routeSvg'),box=$('map'),w=box.clientWidth,h=box.clientHeight;svg.setAttribute('viewBox',`0 0 ${w} ${h}`);let d='';st.route.forEach((p,i)=>{const q=project(p[0],p[1],st.center,st.zoom,w,h);d+=(i?'L':'M')+q[0].toFixed(1)+' '+q[1].toFixed(1)+' '});svg.innerHTML=`<path d="${d}" fill="none" stroke="#16B978" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity=".95"/><path d="${d}" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".65"/>`;const q=project(st.route[0][0],st.route[0][1],st.center,st.zoom,w,h);$('currentMarker').style.left=q[0]+'px';$('currentMarker').style.top=q[1]+'px';}
function renderMap(){renderTiles();renderRoute();}
function renderUI(){const kmh=st.rpm*2*2.1/60*3.6; const prog=Math.min(100,st.km/LEG*100); const z=zoneOf(st.hr); const nS=next('small'),nM=next('medium'),nL=next('large');
 $('speed').textContent=kmh.toFixed(1); const rpmRatio=Math.max(0,Math.min(1,st.rpm/120)); $('ringValue').textContent=Math.round(st.rpm); $('ringMain').textContent=Math.round(st.rpm)+' rpm'; const C=2*Math.PI*18; $('cadenceRing').setAttribute('stroke-dasharray', C.toFixed(1)); $('cadenceRing').setAttribute('stroke-dashoffset', (C*(1-rpmRatio)).toFixed(1)); $('mode').textContent=st.running?'追従 ON':'追従 OFF'; $('remain').textContent='あと '+(nL?(nL.km-st.km).toFixed(1):'0.0')+' km'; $('fill').style.width=prog+'%'; $('bike').style.left=prog+'%';
 $('smallGoal').textContent=nS?'通過地点 '+(nS.km-st.km).toFixed(1)+'km':'通過地点 —'; $('mediumGoal').textContent=nM?'中継地 '+nM.n+' '+(nM.km-st.km).toFixed(0)+'km':'中継地 —';
 const stats=[['距離',st.sess.toFixed(2),'km'],['時間',fmtTime(st.t),''],['消費',Math.round(st.cal),'kcal'],['最高',st.mx.toFixed(1),'km/h'],['XP',Math.round(st.cal*0.9),''],['累計',st.km.toFixed(1),'km']];
 $('metrics').innerHTML=stats.map(a=>`<div class="dock-card"><div class="label">${a[0]}</div><div class="value">${a[1]}<span class="unit">${a[2]}</span></div></div>`).join('');
 $('metrics2').innerHTML='';
 $('pedalRpm').textContent=Math.round(st.rpm);
 $('zoneBpm').textContent=Math.round(st.hr); $('zoneMain').childNodes[0].nodeValue=zones[z].n; $('zoneMain').style.color=zones[z].c; $('zoneDot').style.background=zones[z].c; $('bars').innerHTML=zones.map((zz,i)=>`<div class="zone-seg ${i===z?'active':''}" style="background:${zz.c}"></div>`).join(''); $('zoneGuide').innerHTML='<span class="zone-name">今は'+zones[z].n+'ゾーンです</span><span class="zone-tip">'+(z>=3?'無理しすぎに注意':'')+'</span>';
}
function setDisplay(mode){st.display=mode;document.querySelector('.phone').classList.toggle('compact',mode==='compact');document.querySelector('.phone').classList.toggle('maponly',mode==='maponly');$('displayToggle').textContent=mode==='detail'?'簡易表示':mode==='compact'?'地図だけ':'詳細表示'; if($('displayFloat')) $('displayFloat').textContent=mode==='compact'?'詳細表示':'UI表示';}
function cycleDisplay(){setDisplay(st.display==='detail'?'compact':st.display==='compact'?'maponly':'detail');}
function setInput(mode){st.input=mode;document.querySelector('.phone').classList.toggle('manual',mode==='manual');$('inputModeToggle').textContent=mode==='manual'?'手動入力':'センサー入力';}
function toggleInput(){setInput(st.input==='sensor'?'manual':'sensor');}
function bindPan(){let down=false,last=null,drag=false;const el=$('map');el.addEventListener('pointerdown',e=>{down=true;last=[e.clientX,e.clientY];drag=false;el.setPointerCapture(e.pointerId)});el.addEventListener('pointermove',e=>{if(!down)return;const dx=e.clientX-last[0],dy=e.clientY-last[1];if(Math.abs(dx)+Math.abs(dy)>4)drag=true;last=[e.clientX,e.clientY];const c=lonLatToTile(st.center[0],st.center[1],st.zoom);st.center=tileToLonLat(c[0]-dx/256,c[1]-dy/256,st.zoom);renderMap()});el.addEventListener('pointerup',()=>{down=false});}
document.addEventListener('click',e=>{

 if(e.target.closest('[data-main-tab]')){
   const tab=e.target.closest('[data-main-tab]').dataset.mainTab;
   document.querySelectorAll('.bottom-tab').forEach(b=>b.classList.toggle('active',b.dataset.mainTab===tab));
   ['routes','records','settings'].forEach(t=>{
     const p=document.getElementById(t+'Page');
     if(p)p.classList.toggle('open',tab===t);
   });
   return;
 }


 if(e.target.closest('#mapToolsToggle')){
   const p=document.getElementById('mapToolsPanel');
   if(p)p.classList.toggle('open');
   return;
 }
 if(e.target.closest('#closeMapTools')){
   const p=document.getElementById('mapToolsPanel');
   if(p)p.classList.remove('open');
   return;
 }
 if(e.target.closest('#recenterBtn2')){
   st.center=[138.3102,34.8362];renderMap();return;
 }
 if(e.target.closest('#zoomInBtn')){
   st.zoom=Math.min(18,st.zoom+1);renderMap();return;
 }
 if(e.target.closest('#zoomOutBtn')){
   st.zoom=Math.max(5,st.zoom-1);renderMap();return;
 }

 if(e.target.closest('#displayToggle')){cycleDisplay();return}
 if(e.target.closest('#mapRestore')){setDisplay('detail');return}
 if(e.target.closest('#displayFloat')){setDisplay('detail');return}
 if(e.target.closest('#inputModeToggle')){toggleInput();return}
 if(e.target.closest('#pedalUp')){st.rpm+=2;renderUI();return}
 if(e.target.closest('#pedalDown')){st.rpm=Math.max(0,st.rpm-2);renderUI();return}
 if(e.target.closest('#runBtnTop')){st.running=!st.running;$('runBtnTop').textContent=st.running?'ストップ':'再開';renderUI();return}
 if(e.target.closest('#recenterBtn')){st.center=[138.3102,34.8362];renderMap();return}
 if(e.target.closest('#buildingToggle')){e.target.classList.toggle('off');e.target.textContent=e.target.classList.contains('off')?'建物 OFF':'建物 ON';return}
 if(e.target.closest('#terrainToggle')){e.target.classList.toggle('off');e.target.textContent=e.target.classList.contains('off')?'地形 OFF':'地形 ON';return}
 if(e.target.closest('#streetToggle')){st.street=!st.street;$('streetFull').classList.toggle('open',st.street);e.target.classList.toggle('off',!st.street);e.target.textContent=st.street?'SV ON':'SV OFF';return}
});
window.addEventListener('resize',renderMap);
setupDots();bindPan();setDisplay('detail');setInput('sensor');renderMap();renderUI();
</script></body>
</html>

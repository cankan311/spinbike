<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Japan Ride D56 Safe Map Core</title>
<style>
:root{
  --bg:#0d1219;--card:#fff;--ink:#111827;--muted:#667085;--blue:#2f6bff;--green:#16B978;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}
.phone{position:fixed;inset:0;background:#101820;overflow:hidden}
#safeMap{position:absolute;inset:0;overflow:hidden;background:#162333;touch-action:none;z-index:0}
.tile-layer{position:absolute;left:0;top:0;width:100%;height:100%;transform-origin:0 0}
.tile{position:absolute;width:256px;height:256px;object-fit:cover;background:#223246}
.route-svg{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none}
.marker{position:absolute;z-index:3;width:22px;height:22px;border-radius:999px;background:var(--green);border:3px solid white;box-shadow:0 2px 10px rgba(0,0,0,.35);display:grid;place-items:center;color:#fff;font-size:10px;font-weight:1000;transform:translate(-50%,-50%)}
.marker.current{width:28px;height:28px;background:#2f6bff}
.map-status{position:absolute;z-index:4;left:16px;top:calc(env(safe-area-inset-top) + 252px);border-radius:999px;background:rgba(255,255,255,.92);padding:8px 12px;font-size:12px;font-weight:900;color:#111827;box-shadow:0 7px 18px rgba(0,0,0,.18)}
.top-card{position:absolute;z-index:10;left:16px;right:16px;top:calc(env(safe-area-inset-top) + 16px);border-radius:28px;background:linear-gradient(135deg,#fff8d9,#f8fbff 62%,#edf4ff);box-shadow:0 12px 26px rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.85);padding:18px 18px 16px;min-height:156px}
.top-row{display:flex;align-items:flex-start;gap:14px}
.badge{width:58px;height:58px;border-radius:20px;background:#fff6bc;display:grid;place-items:center;font-size:32px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05)}
.kicker{font-size:12px;font-weight:1000;color:#c78a13;line-height:1}
.landmark{font-size:38px;line-height:.98;font-weight:1000;letter-spacing:-.06em;color:#111827;text-shadow:0 2px 0 #fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72vw}
.dist{font-size:19px;font-weight:1000;color:#3c4658;margin-top:4px}
.progress-wrap{position:absolute;left:18px;right:18px;bottom:14px}
.progress{height:9px;background:#eef2f7;border-radius:99px;position:relative;overflow:hidden}
.progress-fill{height:100%;width:22%;background:linear-gradient(90deg,#22c55e,#60a5fa);border-radius:99px}
.bike{position:absolute;left:20%;top:-15px;font-size:21px;transform:translateX(-50%)}
.progress-meta{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;font-weight:900;color:#667085}
.ui-hide{position:absolute;right:18px;top:18px;border:0;border-radius:999px;background:#2f3542;color:#fff;font-size:12px;font-weight:1000;padding:10px 13px;box-shadow:0 8px 18px rgba(0,0,0,.22)}
.right-tools{position:absolute;z-index:12;right:16px;bottom:calc(env(safe-area-inset-bottom) + 184px);display:flex;flex-direction:column;gap:9px;align-items:flex-end}
.tool-btn{border:3px solid var(--blue);border-radius:999px;background:rgba(255,255,255,.94);color:#2454c7;font-size:13px;font-weight:1000;min-width:88px;padding:10px 12px;box-shadow:0 6px 15px rgba(0,0,0,.16)}
.target-btn{width:58px;height:58px;min-width:58px;border-radius:15px;font-size:30px;padding:0;display:grid;place-items:center}
.bottom-card{position:absolute;z-index:11;left:16px;right:16px;bottom:calc(env(safe-area-inset-bottom) + 74px);border-radius:28px;background:rgba(248,250,253,.95);border:1px solid rgba(255,255,255,.85);box-shadow:0 -10px 28px rgba(0,0,0,.24);padding:10px;display:grid;grid-template-columns:1.15fr 1fr 1fr;gap:9px}
.stat{border-radius:20px;background:#fff;box-shadow:inset 0 0 0 1px rgba(16,24,40,.04);padding:12px;min-height:72px;display:flex;align-items:center;justify-content:center;flex-direction:column}
.speed{background:#252b35;color:#fff}.stat b{font-size:36px;line-height:.95;font-weight:1000;letter-spacing:-.04em}.stat small{font-size:12px;font-weight:900;color:#667085}.speed small{color:#fff}
.stop{border:0;border-radius:20px;background:#f0444e;color:white;font-size:28px;font-weight:1000}
.pedal{border:0;border-radius:18px;background:#eef2f7;color:#111827;font-size:14px;font-weight:1000;padding:12px}
.hr{grid-column:1/4;display:flex;align-items:center;justify-content:space-between;border-radius:20px;background:#fff;padding:14px 16px}
.hr .zone{font-size:24px;font-weight:1000;color:var(--green)}.hr .bpm{font-size:34px;font-weight:1000;color:#f05a86}.hr small{font-size:12px;color:#667085;font-weight:900}
.tabs{position:absolute;z-index:30;left:18px;right:18px;bottom:calc(env(safe-area-inset-bottom) + 8px);height:58px;border-radius:26px;background:rgba(255,255,255,.95);display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:5px;box-shadow:0 14px 30px rgba(0,0,0,.24)}
.tab{border:0;background:transparent;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:1000;color:#667085;font-size:11px}
.tab span{font-size:20px}.tab.active{background:#e8f7f0;color:#12895b}
.compact .top-card{display:none}
.compact .bottom-card{grid-template-columns:1fr 1fr 1fr;bottom:calc(env(safe-area-inset-bottom) + 10px);padding:8px}
.compact .bottom-card .pedal,.compact .bottom-card .stop{display:none}
.compact .stat{min-height:56px;padding:8px}.compact .stat b{font-size:27px}.compact .hr{grid-column:1/4;min-height:52px;padding:8px 12px}.compact .tabs{display:none}.compact .right-tools{bottom:calc(env(safe-area-inset-bottom) + 120px)}
.page{position:absolute;z-index:50;inset:0;display:none;background:rgba(12,18,27,.45);backdrop-filter:blur(6px);padding:calc(env(safe-area-inset-top) + 18px) 12px calc(env(safe-area-inset-bottom) + 82px)}
.page.open{display:flex;flex-direction:column;justify-content:flex-end}
.sheet{background:#fff;border-radius:28px;box-shadow:0 22px 50px rgba(0,0,0,.35);overflow:hidden;max-height:78dvh;display:flex;flex-direction:column}
.sheet-head{display:flex;justify-content:space-between;align-items:center;padding:18px 18px 10px}.sheet-title{font-size:28px;font-weight:1000}.sheet-body{padding:0 14px 16px;overflow:auto}
.close{border:0;border-radius:999px;background:#eef2f7;width:42px;height:42px;font-size:22px;font-weight:1000}
.big-action{width:100%;border:0;border-radius:20px;background:var(--green);color:white;font-size:17px;font-weight:1000;padding:16px;margin:8px 0 14px}
.empty{border-radius:18px;background:#f3f6fb;padding:16px;color:#667085;font-size:13px;font-weight:850}
.route-item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border-radius:18px;background:#f7f9fc;border:1px solid #e5e9f1;padding:12px;margin-bottom:9px}
.route-name{font-size:15px;font-weight:1000}.route-meta{font-size:11px;font-weight:850;color:#667085;margin-top:3px}.route-actions{display:flex;gap:6px}.route-actions button{border:0;border-radius:999px;background:#eef2f7;font-size:11px;font-weight:900;padding:8px 9px}.route-actions .run{background:var(--green);color:white}.route-actions .del{background:#fff0f0;color:#d33}
.builder{position:absolute;z-index:60;inset:0;background:#101820;display:none}.builder.open{display:block}
.builder-map{position:absolute;inset:0;overflow:hidden;background:#172333;touch-action:none}
.builder-top{position:absolute;left:12px;right:12px;top:calc(env(safe-area-inset-top) + 12px);display:flex;gap:10px;align-items:center;z-index:5}
.rb-back,.rb-save{border:0;border-radius:999px;background:#fff;color:#111827;font-size:13px;font-weight:1000;padding:12px 14px;box-shadow:0 8px 20px rgba(0,0,0,.22)}.rb-save{background:var(--green);color:white}
.rb-mid{flex:1;border-radius:20px;background:rgba(17,24,39,.72);color:#fff;padding:10px 12px;font-weight:1000}
.rb-card{position:absolute;z-index:5;left:12px;right:12px;top:calc(env(safe-area-inset-top) + 82px);border-radius:22px;background:rgba(255,255,255,.94);padding:12px 14px;display:flex;justify-content:space-between;box-shadow:0 12px 28px rgba(0,0,0,.24)}
.rb-dist{font-size:34px;font-weight:1000}.rb-dist small{font-size:13px;color:#667085}.rb-label{font-size:10px;font-weight:900;color:#667085}.rb-target{text-align:right}.rb-target select{border:0;border-radius:12px;background:#eef4ff;color:#2454c7;font-size:12px;font-weight:900;padding:8px}
.rb-bottom{position:absolute;z-index:5;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 12px);border-radius:24px;background:rgba(255,255,255,.96);padding:12px;box-shadow:0 16px 34px rgba(0,0,0,.30)}
.rb-name{width:100%;border:1px solid #e3e7ef;border-radius:16px;padding:13px;font-size:14px;font-weight:900}.rb-hint{font-size:11px;font-weight:850;color:#667085;margin:8px 2px 10px}.rb-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.rb-actions button{border:0;border-radius:999px;background:#eef2f7;font-size:12px;font-weight:1000;padding:11px}
</style>
</head>
<body>
<div class="phone" id="app">
  <div id="safeMap">
    <div class="tile-layer" id="tileLayer"></div>
    <svg class="route-svg" id="routeSvg"></svg>
    <div class="marker current" id="currentMarker">🚴</div>
  </div>
  <div class="map-status" id="mapStatus">地図表示OK</div>

  <section class="top-card">
    <button class="ui-hide" id="uiToggle">UI隠す</button>
    <div class="top-row">
      <div class="badge">🏯</div>
      <div>
        <div class="kicker" id="modeKicker">次の名所</div>
        <div class="landmark" id="landmark">名古屋城</div>
        <div class="dist" id="remainDist">あと 186.8 km</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress"><div class="progress-fill" id="progressFill"></div><div class="bike" id="bikeIcon">🚴</div></div>
      <div class="progress-meta"><span>通過地点 3.8km</span><span>中継地 大井川 27km</span></div>
    </div>
  </section>

  <div class="right-tools">
    <button class="tool-btn target-btn" id="centerBtn">⌖</button>
    <button class="tool-btn" id="zoomIn">＋</button>
    <button class="tool-btn" id="zoomOut">−</button>
    <button class="tool-btn" id="travelBtn">旅ログ</button>
  </div>

  <section class="bottom-card">
    <div class="stat speed"><b id="speed">14.6</b><small>km/h</small></div>
    <div class="stat"><b id="rpm">58</b><small>rpm ケイデンス</small></div>
    <button class="stop" id="stopBtn">ストップ</button>
    <button class="pedal" id="pedalMinus">ペダル −</button>
    <div class="stat"><b id="rpm2">58</b><small>rpm</small></div>
    <button class="pedal" id="pedalPlus">ペダル ＋</button>
    <div class="hr"><div><small>心拍ゾーン</small><div class="zone">脂肪燃焼 🔥</div></div><div class="bpm"><span id="hr">123</span><small> bpm</small></div></div>
  </section>

  <nav class="tabs">
    <button class="tab active" data-tab="ride"><span>🚴</span>走る</button>
    <button class="tab" data-tab="routes"><span>🗺️</span>ルート</button>
    <button class="tab" data-tab="records"><span>📊</span>記録</button>
    <button class="tab" data-tab="settings"><span>⚙️</span>設定</button>
  </nav>

  <section class="page" id="routesPage">
    <div class="sheet">
      <div class="sheet-head"><div class="sheet-title">マイルート</div><button class="close" data-tab="ride">×</button></div>
      <div class="sheet-body">
        <button class="big-action" id="openBuilder">＋ 新しいルートを作る</button>
        <div id="routeList"></div>
      </div>
    </div>
  </section>
  <section class="page" id="recordsPage"><div class="sheet"><div class="sheet-head"><div class="sheet-title">記録</div><button class="close" data-tab="ride">×</button></div><div class="sheet-body"><div class="empty">距離・時間・体重グラフは次フェーズで追加。</div></div></div></section>
  <section class="page" id="settingsPage"><div class="sheet"><div class="sheet-head"><div class="sheet-title">設定</div><button class="close" data-tab="ride">×</button></div><div class="sheet-body"><div class="empty">入力方式・表示設定は次フェーズで追加。</div></div></div></section>

  <section class="builder" id="builder">
    <div class="builder-map" id="builderMap">
      <div class="tile-layer" id="builderTiles"></div>
      <svg class="route-svg" id="builderSvg"></svg>
    </div>
    <div class="builder-top">
      <button class="rb-back" id="builderClose">← 戻る</button>
      <div class="rb-mid">地図をタップしてルート作成</div>
      <button class="rb-save" id="builderSave">保存</button>
    </div>
    <div class="rb-card"><div><div class="rb-label">現在の距離</div><div class="rb-dist"><span id="rbDistance">0.0</span><small> km</small></div></div><div class="rb-target"><div class="rb-label">目標</div><select id="rbTarget"><option value="5">5km</option><option value="10" selected>10km</option><option value="15">15km</option><option value="20">20km</option></select><div class="rb-label">あと <b id="rbRemain">10.0</b> km</div></div></div>
    <div class="rb-bottom"><input class="rb-name" id="rbName" placeholder="ルート名 例：近所10kmコース"><div class="rb-hint" id="rbHint">地図をタップしてスタート地点を置いてください。</div><div class="rb-actions"><button id="rbUndo">1つ戻す</button><button id="rbClear">クリア</button><button id="rbSample">サンプル</button></div></div>
  </section>
</div>

<script>
(()=>{'use strict';
const $=id=>document.getElementById(id);
const KEY='japanRide.safeRoutes.v1';
const st={zoom:15,center:[138.309,34.835],rpm:58,km:8.2,sess:0,hr:123,route:[[138.299,34.846],[138.304,34.841],[138.309,34.835],[138.318,34.830],[138.330,34.825]],routes:[],rbPoints:[],activeRoute:null,builderCenter:[138.309,34.835],builderZoom:14};
function lonLatToTile(lon,lat,z){const n=2**z;const x=(lon+180)/360*n;const y=(1-Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*n;return[x,y]}
function tileToLonLat(x,y,z){const n=2**z;const lon=x/n*360-180;const lat=Math.atan(Math.sinh(Math.PI*(1-2*y/n)))*180/Math.PI;return[lon,lat]}
function project(lon,lat,center,z,w,h){const c=lonLatToTile(center[0],center[1],z), p=lonLatToTile(lon,lat,z);return[(p[0]-c[0])*256+w/2,(p[1]-c[1])*256+h/2]}
function unproject(px,py,center,z,w,h){const c=lonLatToTile(center[0],center[1],z);return tileToLonLat(c[0]+(px-w/2)/256,c[1]+(py-h/2)/256,z)}
function renderTiles(containerId,center,z){const el=$(containerId), box=el.parentElement, w=box.clientWidth, h=box.clientHeight; if(!w||!h)return; const c=lonLatToTile(center[0],center[1],z); const minX=Math.floor(c[0]-w/512)-1,maxX=Math.floor(c[0]+w/512)+1,minY=Math.floor(c[1]-h/512)-1,maxY=Math.floor(c[1]+h/512)+1; let html=''; for(let x=minX;x<=maxX;x++){for(let y=minY;y<=maxY;y++){const left=(x-c[0])*256+w/2,top=(y-c[1])*256+h/2; html+=`<img class="tile" draggable="false" src="https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/${z}/${x}/${y}.jpg" style="left:${left}px;top:${top}px" onerror="this.src='https://cyberjapandata.gsi.go.jp/xyz/std/${z}/${x}/${y}.png'">`;}} el.innerHTML=html}
function renderMainMap(){renderTiles('tileLayer',st.center,st.zoom); renderRoute('routeSvg',st.route,st.center,st.zoom); const box=$('safeMap'), p=project(st.route[0][0],st.route[0][1],st.center,st.zoom,box.clientWidth,box.clientHeight); $('currentMarker').style.left=p[0]+'px'; $('currentMarker').style.top=p[1]+'px'}
function renderRoute(svgId,points,center,z){const svg=$(svgId), box=svg.parentElement, w=box.clientWidth,h=box.clientHeight; svg.setAttribute('viewBox',`0 0 ${w} ${h}`); let d=''; points.forEach((p,i)=>{const q=project(p[0],p[1],center,z,w,h); d+=(i?'L':'M')+q[0].toFixed(1)+' '+q[1].toFixed(1)+' '}); svg.innerHTML=`<path d="${d}" fill="none" stroke="#16B978" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity=".95"/><path d="${d}" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".65"/>`}
function initPan(el,centerKey,zoomKey,render){let down=false,last=null; el.addEventListener('pointerdown',e=>{down=true;last=[e.clientX,e.clientY];el.setPointerCapture(e.pointerId)}); el.addEventListener('pointermove',e=>{if(!down)return;const dx=e.clientX-last[0],dy=e.clientY-last[1];last=[e.clientX,e.clientY];const c=st[centerKey],z=st[zoomKey],tc=lonLatToTile(c[0],c[1],z);st[centerKey]=tileToLonLat(tc[0]-dx/256,tc[1]-dy/256,z);render()}); el.addEventListener('pointerup',()=>down=false); el.addEventListener('pointercancel',()=>down=false)}
function hav(a,b){const R=6371000,rad=d=>d*Math.PI/180,dLat=rad(b[1]-a[1]),dLon=rad(b[0]-a[0]),la1=rad(a[1]),la2=rad(b[1]);const h=Math.sin(dLat/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;return 2*R*Math.asin(Math.sqrt(h))}
function distKm(ps){let m=0;for(let i=1;i<ps.length;i++)m+=hav(ps[i-1],ps[i]);return m/1000}
function setTab(tab){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));['routes','records','settings'].forEach(t=>$(t+'Page').classList.toggle('open',tab===t));if(tab==='routes')renderRouteList()}
function loadRoutes(){try{st.routes=JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){st.routes=[]}}
function saveRoutes(){localStorage.setItem(KEY,JSON.stringify(st.routes))}
function renderRouteList(){loadRoutes();const el=$('routeList'); if(!st.routes.length){el.innerHTML='<div class="empty">保存済みルートはありません。まず「新しいルートを作る」から作成してください。</div>';return} el.innerHTML=st.routes.map(r=>`<div class="route-item"><div><div class="route-name">${esc(r.name)}</div><div class="route-meta">${Number(r.km).toFixed(1)}km ・ 非公開</div></div><div class="route-actions"><button class="run" data-run="${r.id}">走る</button><button class="del" data-del="${r.id}">削除</button></div></div>`).join('')}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function openBuilder(){st.rbPoints=[];$('builder').classList.add('open');setTimeout(renderBuilder,50)}
function closeBuilder(){$('builder').classList.remove('open')}
function renderBuilder(){renderTiles('builderTiles',st.builderCenter,st.builderZoom);renderRoute('builderSvg',st.rbPoints,st.builderCenter,st.builderZoom);document.querySelectorAll('.builder .marker').forEach(e=>e.remove());const box=$('builderMap');st.rbPoints.forEach((p,i)=>{const q=project(p[0],p[1],st.builderCenter,st.builderZoom,box.clientWidth,box.clientHeight);const m=document.createElement('div');m.className='marker';m.textContent=i+1;m.style.left=q[0]+'px';m.style.top=q[1]+'px';box.appendChild(m)});const km=distKm(st.rbPoints), target=+$('rbTarget').value;$('rbDistance').textContent=km.toFixed(1);$('rbRemain').textContent=Math.max(0,target-km).toFixed(1);$('rbHint').textContent=st.rbPoints.length<1?'地図をタップしてスタート地点を置いてください。':st.rbPoints.length<2?'次の地点をタップすると距離が出ます。':'点を追加して目標距離まで伸ばせます。'}
function saveBuilder(){if(st.rbPoints.length<2){alert('2点以上タップしてルートを作ってください');return}loadRoutes();const name=$('rbName').value.trim()||'マイルート '+new Date().toLocaleDateString('ja-JP');st.routes.unshift({id:'r'+Date.now(),name,points:st.rbPoints.slice(),km:distKm(st.rbPoints)});saveRoutes();$('rbName').value='';closeBuilder();setTab('routes')}
function runRoute(id){loadRoutes();const r=st.routes.find(x=>x.id===id);if(!r)return;st.activeRoute=r;st.route=r.points.slice();st.center=r.points[0];$('modeKicker').textContent='マイルート';$('landmark').textContent=r.name;$('remainDist').textContent='あと '+Number(r.km).toFixed(1)+' km';setTab('ride');renderMainMap()}
function ui(){const kmh=st.rpm*2*2.1/60*3.6;$('speed').textContent=kmh.toFixed(1);$('rpm').textContent=Math.round(st.rpm);$('rpm2').textContent=Math.round(st.rpm);$('hr').textContent=Math.round(st.hr)}
document.addEventListener('click',e=>{const tab=e.target.closest('[data-tab]');if(tab){setTab(tab.dataset.tab);return} if(e.target.closest('#uiToggle')){$('app').classList.toggle('compact');$('uiToggle').textContent=$('app').classList.contains('compact')?'UI表示':'UI隠す';return} if(e.target.closest('#zoomIn')){st.zoom=Math.min(18,st.zoom+1);renderMainMap();return} if(e.target.closest('#zoomOut')){st.zoom=Math.max(5,st.zoom-1);renderMainMap();return} if(e.target.closest('#centerBtn')){st.center=st.route[0]||[138.309,34.835];renderMainMap();return} if(e.target.closest('#pedalPlus')){st.rpm+=2;ui();return} if(e.target.closest('#pedalMinus')){st.rpm=Math.max(0,st.rpm-2);ui();return} if(e.target.closest('#openBuilder')){openBuilder();return} if(e.target.closest('#builderClose')){closeBuilder();return} if(e.target.closest('#builderSave')){saveBuilder();return} if(e.target.closest('#rbUndo')){st.rbPoints.pop();renderBuilder();return} if(e.target.closest('#rbClear')){st.rbPoints=[];renderBuilder();return} if(e.target.closest('#rbSample')){st.rbPoints=[[138.3015,34.8447],[138.3041,34.8409],[138.3090,34.8368],[138.3152,34.8335],[138.3232,34.8291],[138.3330,34.8250]];renderBuilder();return} const run=e.target.closest('[data-run]');if(run){runRoute(run.dataset.run);return} const del=e.target.closest('[data-del]');if(del){loadRoutes();st.routes=st.routes.filter(r=>r.id!==del.dataset.del);saveRoutes();renderRouteList();return}});
$('builderMap').addEventListener('click',e=>{if(e.target.closest('button'))return;const r=$('builderMap').getBoundingClientRect();st.rbPoints.push(unproject(e.clientX-r.left,e.clientY-r.top,st.builderCenter,st.builderZoom,r.width,r.height));renderBuilder()});
$('rbTarget').addEventListener('change',renderBuilder);
initPan($('safeMap'),'center','zoom',renderMainMap);initPan($('builderMap'),'builderCenter','builderZoom',renderBuilder);
window.addEventListener('resize',()=>{renderMainMap();if($('builder').classList.contains('open'))renderBuilder()});
loadRoutes();renderMainMap();ui();
})()
</script>
</body>
</html>

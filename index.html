<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Japan Ride D71 Repair UI Regressions</title>
<style>
:root{
  --ink:#111827;
  --muted:#667085;
  --blue:#2f6bff;
  --green:#16B978;
  --red:#f0444e;
  --card:rgba(248,250,253,.94);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:'Corporate Logo Rounded','Corporate Logo Round','CorpRound','M PLUS Rounded 1c','Kosugi Maru','Hiragino Maru Gothic ProN',ui-rounded,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}
.phone{position:fixed;inset:0;overflow:hidden;background:#101820}
.map{position:absolute;inset:0;overflow:hidden;background:#172333;touch-action:none}
.tile-layer{position:absolute;inset:0;z-index:0}
.tile{position:absolute;width:256px;height:256px;object-fit:cover;background:#223246}
.route-svg{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none}
.marker{position:absolute;z-index:3;width:28px;height:28px;border-radius:999px;background:var(--blue);border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.38);display:grid;place-items:center;transform:translate(-50%,-50%);font-size:15px}

/* ---------- Normal old-style ride UI ---------- */
.ui{position:absolute;inset:0;z-index:20;pointer-events:none}
.hero{
  pointer-events:auto;
  position:absolute;left:16px;right:16px;top:calc(env(safe-area-inset-top) + 14px);
  min-height:150px;border-radius:30px;
  background:linear-gradient(135deg,#fff8d9 0%,#f8fbff 62%,#edf4ff 100%);
  border:1px solid rgba(255,255,255,.86);
  box-shadow:0 14px 30px rgba(0,0,0,.23);
  padding:16px 18px 14px;
}
.top-chips{
  display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px;
}
.top-chips::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;
  border:0;border-radius:999px;background:rgba(255,255,255,.82);color:#111827;
  font:900 12px/1.1 inherit;padding:8px 11px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05);
  pointer-events:auto;white-space:nowrap;
}
.chip.primary{background:#111827;color:#fff}
.chip.blue{background:var(--blue);color:#fff}
.chip.place{pointer-events:none;max-width:46vw;overflow:hidden;text-overflow:ellipsis}
.hero-main{display:flex;gap:14px;align-items:flex-start}
.hero-icon{width:58px;height:58px;border-radius:20px;background:#fff6bc;display:grid;place-items:center;font-size:32px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05)}
.eyebrow{font-size:12px;font-weight:1000;color:#c78a13;line-height:1}
.landmark{font-size:36px;line-height:.98;font-weight:1000;letter-spacing:-.055em;color:#111827;text-shadow:0 2px 0 #fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72vw}
.remain{font-size:18px;font-weight:1000;color:#3c4658;margin-top:4px}
.progress-wrap{position:absolute;left:18px;right:18px;bottom:14px}
.progress{height:9px;background:#eef2f7;border-radius:999px;position:relative}
.fill{height:100%;width:22%;background:linear-gradient(90deg,#22c55e,#60a5fa);border-radius:999px}
.bike{position:absolute;left:20%;top:-15px;font-size:21px;transform:translateX(-50%)}
.subgoals{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;font-weight:900;color:#667085}

/* bottom info card separated from bottom tabs */
.dock{
  pointer-events:auto;
  position:absolute;left:16px;right:16px;bottom:calc(env(safe-area-inset-bottom) + 74px);
  border-radius:30px;background:var(--card);border:1px solid rgba(255,255,255,.86);
  box-shadow:0 -12px 32px rgba(0,0,0,.25);
  padding:10px;
}
.meter-row{display:grid;grid-template-columns:1.05fr .95fr 1.05fr;gap:8px}
.card{border-radius:20px;background:#fff;min-height:70px;display:flex;align-items:center;justify-content:center;flex-direction:column;box-shadow:inset 0 0 0 1px rgba(16,24,40,.04);padding:9px}
.speed{background:#252b35;color:#fff}
.value{font-size:34px;line-height:.94;font-weight:1000;letter-spacing:-.04em}
.unit{font-size:11px;font-weight:900;color:#667085;margin-top:4px}.speed .unit{color:#fff}
.stop{border:0;border-radius:20px;background:var(--red);color:#fff;font:1000 24px/1 inherit;min-height:70px}
.cadence .value{font-size:30px}
.zone-card{
  margin-top:8px;border-radius:20px;background:#fff;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;min-height:68px
}
.zone-title{font-size:22px;font-weight:1000;color:var(--green);line-height:1.05}
.zone-sub{font-size:11px;font-weight:900;color:#667085;margin-top:2px}
.bpm{font-size:32px;font-weight:1000;color:#f05a86;line-height:1}.bpm small{font-size:11px;color:#667085}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px}
.metric{border-radius:16px;background:#fff;padding:8px 10px;box-shadow:inset 0 0 0 1px rgba(16,24,40,.05)}
.metric small{display:block;font-size:10px;font-weight:900;color:#667085}
.metric b{display:block;font-size:17px;font-weight:1000;color:#111827;line-height:1.05;margin-top:2px}

/* Manual pedals only */
.pedal-row{display:none;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.phone.manual .pedal-row{display:grid}
.pedal{border:0;border-radius:18px;background:#eef2f7;color:#111827;font:1000 13px/1 inherit;padding:12px}

/* bottom tabs */
.bottom-tabs{
  pointer-events:auto;
  position:absolute;z-index:30;left:16px;right:16px;bottom:calc(env(safe-area-inset-bottom) + 8px);
  height:58px;border-radius:26px;background:rgba(255,255,255,.94);border:1px solid rgba(255,255,255,.82);
  display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:5px;box-shadow:0 14px 30px rgba(0,0,0,.24);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)
}
.tab{border:0;background:transparent;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#667085;font-weight:900;font-family:inherit}
.tab span{font-size:20px;line-height:1}.tab b{font-size:10px;line-height:1}.tab.active{background:#e8f7f0;color:#12895b}

/* ---------- Compact mode ---------- */
.phone.compact .hero{min-height:78px;padding:12px 14px;border-radius:24px}
.phone.compact .top-chips{margin-bottom:6px}
.phone.compact .hero-icon,.phone.compact .eyebrow,.phone.compact .progress-wrap{display:none}
.phone.compact .hero-main{gap:0}
.phone.compact .landmark{font-size:22px;max-width:72vw}
.phone.compact .remain{font-size:14px;margin-top:1px}
.phone.compact .dock{padding:8px;border-radius:24px}
.phone.compact .metric-grid,.phone.compact .pedal-row{display:none}
.phone.compact .meter-row{grid-template-columns:1fr 1fr 1fr}
.phone.compact .card{min-height:54px;padding:8px}
.phone.compact .value{font-size:27px}
.phone.compact .stop{display:none}
.phone.compact .zone-card{min-height:52px;padding:8px 12px}
.phone.compact .zone-title{font-size:18px}.phone.compact .bpm{font-size:24px}

/* ---------- Map view ---------- */
.map-view-controls{display:none}
.phone.mapview .ui,.phone.mapview .bottom-tabs,.phone.mapview .page{display:none!important}
.phone.mapview .map-view-controls{
  display:grid;position:absolute;z-index:40;right:12px;bottom:calc(env(safe-area-inset-bottom) + 12px);
  grid-template-columns:54px 54px;gap:8px;padding:8px;border-radius:22px;background:rgba(255,255,255,.92);
  box-shadow:0 14px 34px rgba(0,0,0,.25);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)
}
.map-view-controls button{border:2px solid var(--blue);border-radius:16px;background:#fff;color:#2454c7;font:1000 18px/1 inherit;height:44px}
.map-view-controls .wide{grid-column:1/3;border-radius:999px;font-size:12px}
.map-view-controls .dark{background:#111827;color:white;border-color:#111827}
.map-view-controls .on{background:var(--blue);color:#fff}

/* pages */
.page{position:absolute;inset:0;z-index:50;display:none;align-items:flex-end;background:rgba(12,18,27,.36);padding:calc(env(safe-area-inset-top) + 18px) 12px calc(env(safe-area-inset-bottom) + 76px);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
.page.open{display:flex}.sheet{width:100%;border-radius:26px;background:#fff;box-shadow:0 22px 50px rgba(0,0,0,.35);overflow:hidden}.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:16px}.sheet-head strong{font-size:26px}.sheet-head button{border:0;border-radius:999px;width:42px;height:42px;background:#eef2f7;font-size:22px;font-weight:1000}.sheet-body{padding:0 16px 18px;font-weight:850;color:#667085}

/* responsive guardrails */
@media(max-height:760px){
  .hero{min-height:132px;padding:13px 15px}.landmark{font-size:31px}.remain{font-size:16px}
  .dock{bottom:calc(env(safe-area-inset-bottom) + 66px);padding:8px}
  .bottom-tabs{height:52px}
  .card,.stop{min-height:56px}.value{font-size:28px}.cadence .value{font-size:26px}
  .zone-card{min-height:56px;padding:9px 13px}.zone-title{font-size:18px}.bpm{font-size:25px}
  .metric-grid{gap:6px}.metric{padding:7px 9px}.metric b{font-size:15px}
}
@media(max-width:380px){
  .hero,.dock,.bottom-tabs{left:12px;right:12px}
  .chip{font-size:11px;padding:8px 10px}
}

/* D71 repair: compact old rounded UI, restore HR gauge, always-detail, pinch/visual toggles */
.hero{min-height:136px!important;padding:14px 16px 12px!important;border-radius:28px!important}
.landmark{font-size:32px!important;line-height:.95!important;max-width:68vw!important}
.remain{font-size:16px!important;margin-top:3px!important}
.progress-wrap{bottom:11px!important}
.hero-icon{width:54px!important;height:54px!important;border-radius:18px!important;font-size:29px!important}

.dock{
  border-radius:26px!important;
  padding:8px!important;
  bottom:calc(env(safe-area-inset-bottom) + 72px)!important;
}
.meter-row{gap:7px!important}
.card,.stop{min-height:58px!important;border-radius:18px!important}
.value{font-size:30px!important}
.cadence .value{font-size:28px!important}
.stop{font-size:22px!important}

.zone-card{
  min-height:62px!important;
  margin-top:7px!important;
  padding:9px 13px!important;
  border-radius:18px!important;
}
.zone-left{min-width:0;flex:1}
.zone-title{font-size:21px!important}
.bpm{font-size:30px!important}
.zone-gauge{
  display:grid!important;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  margin:6px 0 4px;
  max-width:420px;
}
.zone-gauge span{
  height:7px;
  border-radius:999px;
  background:#e9eef5;
}
.zone-gauge span:nth-child(1){background:#9CC3FF}
.zone-gauge span:nth-child(2){background:#16B978}
.zone-gauge span:nth-child(3){background:#F6C544}
.zone-gauge span:nth-child(4){background:#FF8A3D}
.zone-gauge span:nth-child(5){background:#FF5872}
.zone-gauge span:not(.active){opacity:.28}
.metric-grid{gap:6px!important;margin-top:7px!important}
.metric{border-radius:15px!important;padding:7px 10px!important}
.metric small{font-size:10px!important}
.metric b{font-size:16px!important}

.always-detail{
  position:absolute;
  z-index:80;
  right:12px;
  top:calc(env(safe-area-inset-top) + 12px);
  border:0;
  border-radius:999px;
  background:#111827;
  color:white;
  font-family:inherit;
  font-size:12px;
  font-weight:1000;
  padding:10px 13px;
  box-shadow:0 10px 24px rgba(0,0,0,.28);
  pointer-events:auto;
}
.phone:not(.compact):not(.mapview) .always-detail{opacity:.55}
.phone.mapview .always-detail{display:none!important}

.map-overlay{
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  display:none;
}
.phone.terrain-on .terrain-overlay{
  display:block;
  background:
    radial-gradient(circle at 28% 28%, rgba(34,197,94,.24), transparent 36%),
    radial-gradient(circle at 72% 62%, rgba(16,185,129,.20), transparent 38%),
    repeating-linear-gradient(25deg, rgba(255,255,255,.14) 0 1px, transparent 1px 18px);
  opacity:.55;
}
.phone.buildings-on .building-overlay{
  display:block;
  background:
    linear-gradient(90deg, rgba(255,255,255,.16) 1px, transparent 1px),
    linear-gradient(0deg, rgba(255,255,255,.12) 1px, transparent 1px);
  background-size:34px 34px;
  opacity:.45;
}
.phone.sv-on .map:after{
  content:'SV ON';
  position:absolute;
  z-index:4;
  left:12px;
  bottom:12px;
  border-radius:999px;
  padding:8px 12px;
  background:rgba(17,24,39,.82);
  color:white;
  font-weight:1000;
  font-size:12px;
}

.phone.compact .zone-gauge{display:none!important}
.phone.compact .always-detail{opacity:1}
.phone.compact .hero{min-height:72px!important}
.phone.compact .dock{bottom:calc(env(safe-area-inset-bottom) + 72px)!important}
.phone.compact .card{min-height:50px!important}
.phone.compact .zone-card{min-height:48px!important}

@media(max-height:760px){
  .hero{min-height:122px!important;padding:12px 14px 10px!important}
  .landmark{font-size:28px!important}
  .dock{bottom:calc(env(safe-area-inset-bottom) + 64px)!important;padding:7px!important}
  .card,.stop{min-height:50px!important}
  .value{font-size:26px!important}
  .zone-card{min-height:54px!important;padding:8px 12px!important}
  .zone-title{font-size:18px!important}
  .bpm{font-size:26px!important}
  .metric-grid{display:grid!important}
  .metric{padding:6px 9px!important}
  .metric b{font-size:14px!important}
}

</style>
</head>
<body>
<div class="phone" id="app">
  <div class="map" id="map">
    <div class="tile-layer" id="tileLayer"></div>
    <svg class="route-svg" id="routeSvg"></svg>
    <div class="map-overlay terrain-overlay" id="terrainOverlay"></div>
    <div class="map-overlay building-overlay" id="buildingOverlay"></div>
    <div class="marker" id="marker">🚴</div>
  </div>

  <div class="ui">
    <section class="hero">
      <div class="top-chips">
        <button class="chip place" id="placeChip">📍 静岡県 焼津市 八楠</button>
        <button class="chip primary" id="displayToggle">簡易表示</button>
        <button class="chip" id="inputToggle">センサー入力</button>
      </div>
      <div class="hero-main">
        <div class="hero-icon">🏯</div>
        <div>
          <div class="eyebrow">次の名所</div>
          <div class="landmark" id="landmark">名古屋城</div>
          <div class="remain" id="remain">あと 186.8 km</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress"><div class="fill" id="fill"></div><div class="bike" id="bike">🚴</div></div>
        <div class="subgoals"><span id="smallGoal">通過地点 3.8km</span><span id="mediumGoal">中継地 大井川 27km</span></div>
      </div>
    </section>

    <section class="dock">
      <div class="meter-row">
        <div class="card speed"><div class="value" id="speed">14.6</div><div class="unit">km/h</div></div>
        <div class="card cadence"><div class="value"><span id="rpm">58</span></div><div class="unit">rpm ケイデンス</div></div>
        <button class="stop" id="stopBtn">ストップ</button>
      </div>
      <div class="zone-card">
        <div class="zone-left"><div class="zone-sub">心拍ゾーン</div><div class="zone-title" id="zoneTitle">脂肪燃焼 🔥</div><div class="zone-gauge" id="zoneGauge"><span></span><span></span><span></span><span></span><span></span></div><div class="zone-sub">今は脂肪燃焼ゾーンです</div></div>
        <div class="bpm"><span id="hr">123</span><small> bpm</small></div>
      </div>
      <div class="metric-grid">
        <div class="metric"><small>距離</small><b id="mDist">0.00km</b></div>
        <div class="metric"><small>時間</small><b id="mTime">12:00</b></div>
        <div class="metric"><small>消費</small><b id="mCal">96kcal</b></div>
        <div class="metric"><small>最高</small><b id="mMax">28.4km/h</b></div>
        <div class="metric"><small>XP</small><b id="mXp">86</b></div>
        <div class="metric"><small>累計</small><b id="mTotal">8.2km</b></div>
      </div>
      <div class="pedal-row">
        <button class="pedal" id="pedalDown">ペダル −</button>
        <button class="pedal" id="pedalUp">ペダル ＋</button>
      </div>
    </section>
  </div>

  <nav class="bottom-tabs" id="bottomTabs">
    <button class="tab active" data-tab="ride"><span>🚴</span><b>走る</b></button>
    <button class="tab" data-tab="routes"><span>🗺️</span><b>ルート</b></button>
    <button class="tab" data-tab="records"><span>📊</span><b>記録</b></button>
    <button class="tab" data-tab="settings"><span>⚙️</span><b>設定</b></button>
  </nav>

  <section class="page" id="routesPage"><div class="sheet"><div class="sheet-head"><strong>ルート</strong><button data-tab="ride">×</button></div><div class="sheet-body">マイルート作成はUI安定後に戻します。</div></div></section>
  <section class="page" id="recordsPage"><div class="sheet"><div class="sheet-head"><strong>記録</strong><button data-tab="ride">×</button></div><div class="sheet-body">記録画面はUI安定後に戻します。</div></div></section>
  <section class="page" id="settingsPage"><div class="sheet"><div class="sheet-head"><strong>設定</strong><button data-tab="ride">×</button></div><div class="sheet-body">センサー設定はUI安定後に戻します。</div></div></section>

  <button class="always-detail" id="alwaysDetailBtn">詳細表示</button>
  <div class="map-view-controls">
    <button class="wide dark" id="detailBtn">詳細表示</button>
    <button id="recenterBtn">⌖</button>
    <button id="zoomInBtn">＋</button>
    <button id="zoomOutBtn">−</button>
    <button class="wide" id="buildingBtn">建物 OFF</button>
    <button class="wide" id="terrainBtn">地形 OFF</button>
    <button class="wide" id="svBtn">SV OFF</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const LEG=195;
const CP=[{km:0,t:'large',n:'三保松原'},{km:12,t:'small'},{km:35,t:'medium',n:'大井川'},{km:70,t:'medium',n:'掛川城'},{km:115,t:'medium',n:'浜名湖・弁天島'},{km:168,t:'medium',n:'岡崎城'},{km:195,t:'large',n:'名古屋城'}];
const zones=[{n:'ウォームアップ',c:'#9CC3FF',max:108},{n:'脂肪燃焼',c:'#16B978',max:132},{n:'有酸素',c:'#F6C544',max:150},{n:'全力',c:'#FF8A3D',max:168},{n:'最大',c:'#FF5872',max:999}];
let st={mode:'detail',input:'sensor',zoom:15,center:[138.3102,34.8362],km:8.2,sess:0,t:720,cal:96,hr:123,rpm:58,mx:28.4,buildings:false,terrain:false,sv:false,route:[[138.3082,34.8377],[138.3088,34.8370],[138.3096,34.8365],[138.3105,34.8360],[138.3114,34.8356],[138.3121,34.8350]]};
function lonLatToTile(lon,lat,z){const n=2**z;return[(lon+180)/360*n,(1-Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*n]}
function tileToLonLat(x,y,z){const n=2**z;return[x/n*360-180,Math.atan(Math.sinh(Math.PI*(1-2*y/n)))*180/Math.PI]}
function project(lon,lat,c,z,w,h){const a=lonLatToTile(c[0],c[1],z),b=lonLatToTile(lon,lat,z);return[(b[0]-a[0])*256+w/2,(b[1]-a[1])*256+h/2]}
function renderMap(){const map=$('map'),layer=$('tileLayer'),w=map.clientWidth,h=map.clientHeight,z=st.zoom,c=lonLatToTile(st.center[0],st.center[1],z);let html='';for(let x=Math.floor(c[0]-w/512)-1;x<=Math.floor(c[0]+w/512)+1;x++){for(let y=Math.floor(c[1]-h/512)-1;y<=Math.floor(c[1]+h/512)+1;y++){const l=(x-c[0])*256+w/2,t=(y-c[1])*256+h/2;html+=`<img class="tile" draggable="false" src="https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/${z}/${x}/${y}.jpg" style="left:${l}px;top:${t}px" onerror="this.src='https://cyberjapandata.gsi.go.jp/xyz/std/${z}/${x}/${y}.png'">`;}}layer.innerHTML=html;renderRoute()}
function renderRoute(){const svg=$('routeSvg'),map=$('map'),w=map.clientWidth,h=map.clientHeight;svg.setAttribute('viewBox',`0 0 ${w} ${h}`);let d='';st.route.forEach((p,i)=>{const q=project(p[0],p[1],st.center,st.zoom,w,h);d+=(i?'L':'M')+q[0].toFixed(1)+' '+q[1].toFixed(1)+' '});svg.innerHTML=`<path d="${d}" fill="none" stroke="#16B978" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity=".95"/><path d="${d}" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".65"/>`;const q=project(st.route[0][0],st.route[0][1],st.center,st.zoom,w,h);$('marker').style.left=q[0]+'px';$('marker').style.top=q[1]+'px'}
function fmtTime(sec){return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0')}
function next(type){return CP.find(c=>c.t===type&&c.km>st.km+.01)}
function zone(){return zones.find(z=>st.hr<z.max)||zones[zones.length-1]}
function renderUI(){const kmh=st.rpm*2*2.1/60*3.6,z=zone(),prog=Math.min(100,st.km/LEG*100),nL=next('large'),nS=next('small'),nM=next('medium');$('speed').textContent=kmh.toFixed(1);$('rpm').textContent=Math.round(st.rpm);$('hr').textContent=Math.round(st.hr);$('zoneTitle').textContent=z.n+' 🔥';$('zoneTitle').style.color=z.c;document.querySelectorAll('#zoneGauge span').forEach((s,i)=>s.classList.toggle('active',zones[i]===z));$('remain').textContent='あと '+(nL?(nL.km-st.km).toFixed(1):'0.0')+' km';$('fill').style.width=prog+'%';$('bike').style.left=prog+'%';$('smallGoal').textContent=nS?'通過地点 '+(nS.km-st.km).toFixed(1)+'km':'通過地点 —';$('mediumGoal').textContent=nM?'中継地 '+nM.n+' '+(nM.km-st.km).toFixed(0)+'km':'中継地 —';$('mDist').textContent=st.sess.toFixed(2)+'km';$('mTime').textContent=fmtTime(st.t);$('mCal').textContent=Math.round(st.cal)+'kcal';$('mMax').textContent=st.mx.toFixed(1)+'km/h';$('mXp').textContent=Math.round(st.cal*.9);$('mTotal').textContent=st.km.toFixed(1)+'km'}
function setMode(mode){st.mode=mode;const app=$('app');app.classList.toggle('compact',mode==='compact');app.classList.toggle('mapview',mode==='mapview');$('displayToggle').textContent=mode==='detail'?'簡易表示':mode==='compact'?'地図ビュー':'詳細表示';renderMap()}
function setInput(mode){st.input=mode;$('app').classList.toggle('manual',mode==='manual');$('inputToggle').textContent=mode==='manual'?'手動入力':'センサー入力'}
function setTab(tab){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));['routes','records','settings'].forEach(x=>$(x+'Page').classList.toggle('open',tab===x))}
function bindPan(){
 const m=$('map');
 const pts=new Map();
 let lastPan=null;
 let lastPinch=null;
 function dist(a,b){return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)}
 m.addEventListener('pointerdown',e=>{
   pts.set(e.pointerId,e);
   m.setPointerCapture(e.pointerId);
   if(pts.size===1) lastPan=[e.clientX,e.clientY];
   if(pts.size===2){
     const arr=[...pts.values()];
     lastPinch=dist(arr[0],arr[1]);
     lastPan=null;
   }
 });
 m.addEventListener('pointermove',e=>{
   if(!pts.has(e.pointerId))return;
   pts.set(e.pointerId,e);
   if(pts.size===1 && lastPan){
     const dx=e.clientX-lastPan[0],dy=e.clientY-lastPan[1];
     lastPan=[e.clientX,e.clientY];
     const c=lonLatToTile(st.center[0],st.center[1],st.zoom);
     st.center=tileToLonLat(c[0]-dx/256,c[1]-dy/256,st.zoom);
     renderMap();
   }else if(pts.size>=2){
     const arr=[...pts.values()];
     const d=dist(arr[0],arr[1]);
     if(lastPinch){
       if(d/lastPinch>1.18){st.zoom=Math.min(18,st.zoom+1);lastPinch=d;renderMap();}
       else if(d/lastPinch<0.84){st.zoom=Math.max(5,st.zoom-1);lastPinch=d;renderMap();}
     }else lastPinch=d;
   }
 });
 function end(e){
   pts.delete(e.pointerId);
   if(pts.size===1){
     const a=[...pts.values()][0];
     lastPan=[a.clientX,a.clientY];
     lastPinch=null;
   }else if(pts.size===0){
     lastPan=null;lastPinch=null;
   }
 }
 m.addEventListener('pointerup',end);
 m.addEventListener('pointercancel',end);
}
document.addEventListener('click',e=>{const tab=e.target.closest('[data-tab]');if(tab){setTab(tab.dataset.tab);return}if(e.target.closest('#alwaysDetailBtn')){setMode('detail');return}if(e.target.closest('#displayToggle')){setMode(st.mode==='detail'?'compact':st.mode==='compact'?'mapview':'detail');return}if(e.target.closest('#detailBtn')){setMode('detail');return}if(e.target.closest('#inputToggle')){setInput(st.input==='sensor'?'manual':'sensor');return}if(e.target.closest('#pedalUp')){st.rpm+=2;renderUI();return}if(e.target.closest('#pedalDown')){st.rpm=Math.max(0,st.rpm-2);renderUI();return}if(e.target.closest('#zoomInBtn')){st.zoom=Math.min(18,st.zoom+1);renderMap();return}if(e.target.closest('#zoomOutBtn')){st.zoom=Math.max(5,st.zoom-1);renderMap();return}if(e.target.closest('#recenterBtn')){st.center=[138.3102,34.8362];renderMap();return}if(e.target.closest('#buildingBtn')){st.buildings=!st.buildings;$('app').classList.toggle('buildings-on',st.buildings);$('buildingBtn').textContent=st.buildings?'建物 ON':'建物 OFF';$('buildingBtn').classList.toggle('on',st.buildings);return}if(e.target.closest('#terrainBtn')){st.terrain=!st.terrain;$('app').classList.toggle('terrain-on',st.terrain);$('terrainBtn').textContent=st.terrain?'地形 ON':'地形 OFF';$('terrainBtn').classList.toggle('on',st.terrain);return}if(e.target.closest('#svBtn')){st.sv=!st.sv;$('app').classList.toggle('sv-on',st.sv);$('svBtn').textContent=st.sv?'SV ON':'SV OFF';$('svBtn').classList.toggle('on',st.sv);return}});
window.addEventListener('resize',renderMap);
bindPan();setMode('detail');setInput('sensor');renderMap();renderUI();
</script>
